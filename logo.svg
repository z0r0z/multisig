<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect x="0" y="0" width="120" height="120" fill="#000" rx="16"/>
  <!-- Clip to rounded rect -->
  <clipPath id="c">
    <rect x="0" y="0" width="120" height="120" rx="16"/>
  </clipPath>
  <!-- M filling entire square — bleeds to all edges -->
  <path clip-path="url(#c)" d="
    M 0,120
    L 0,0
    L 18,0
    L 60,68
    L 102,0
    L 120,0
    L 120,120
    L 102,120
    L 102,38
    L 60,106
    L 18,38
    L 18,120
    Z
  " fill="#fff"/>
</svg>
