<!-- ============ CREATE PANEL ============ -->
<div id="panel-create" class="panel active">

  <div class="section">
    <label>owners</label>

    <div class="owner-add">

      <button class="add-btn" onclick="addOwner()">+</button>

  42161:    { name:'Arbitrum',    rpcs:['https://arbitrum-one.publicnode.com','https://1rpc.io/arb','https://arbitrum.drpc.org'],    explorer:'https://arbiscan.io',            hex:'0xa4b1' },
  10:       { name:'OP Mainnet', rpcs:['https://optimism.publicnode.com','https://1rpc.io/op','https://optimism.drpc.org'],       explorer:'https://optimistic.etherscan.io', hex:'0xa' },
  11155111: { name:'Sepolia',      rpcs:['https://ethereum-sepolia.publicnode.com','https://1rpc.io/sepolia','https://sepolia.drpc.org'], explorer:'https://sepolia.etherscan.io',   hex:'0xaa36a7' },

function makeProvider(id) {
  const c = CHAINS[id];
  if(c.rpcs.length === 1) return new ethers.JsonRpcProvider(c.rpcs[0], id, {staticNetwork:true});
  return new ethers.FallbackProvider(c.rpcs.map((url, i) =>
    ({ provider: new ethers.JsonRpcProvider(url, id, {staticNetwork:true}), priority: i + 1, stallTimeout: 2000 })
  ), id);
}

// Factory addresses per chain (placeholder — update after deployment)

  42161:    { chainId:'0xa4b1', chainName:'Arbitrum One',  rpcUrls:['https://arb1.arbitrum.io/rpc'],            blockExplorerUrls:['https://arbiscan.io'],          nativeCurrency:{name:'ETH',symbol:'ETH',decimals:18} },

  84532:    { chainId:'0x14a34', chainName:'Base Sepolia',   rpcUrls:['https://sepolia.base.org'],                blockExplorerUrls:['https://sepolia.basescan.org'],  nativeCurrency:{name:'ETH',symbol:'ETH',decimals:18} },

const MC3 = '0xcA11bde05977b3631167028862bE2a173976CA11';

// --- ABI ---
const MULTISIG_ABI = [
  'function delay() view returns (uint32)',
  'function nonce() view returns (uint32)',
  'function threshold() view returns (uint16)',
  'function ownerCount() view returns (uint16)',

  'function getOwners() view returns (address[])',

  'event Queued(bytes32 indexed txHash, uint256 nonce, uint256 eta)',
  'event Created(address indexed wallet)',
];

const TIMELOCK_EXECUTOR_ABI = [
  'function forwardEnabled(address) view returns (bool)',
  'function enableForward(bool)',
  'function forward(address,address,uint256,bytes,bytes)',
];
const tlIface = new ethers.Interface(TIMELOCK_EXECUTOR_ABI);

const FACTORY_ABI = [
  'function implementation() view returns (address)',

// --- STATE ---
let chainId = parseInt(localStorage.getItem('ms_chain') || '1');
let provider = null;
let signer = null;
let connectedAddress = null;
let msContract = null;

let collectedSigs = [];
let loadedOwners = [];

// --- Wallet (delegates to wallet.js) ---

const _esc = s => String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));

function syncWallet() {
  signer = window._signer;
  connectedAddress = window._connectedAddress;
}

async function onWalletConnect() {
  syncWallet();
  // Verify wallet is on the expected chain
  if(window._connectedWalletProvider) {
    try {
      const wc = await window._connectedWalletProvider.request({method:'eth_chainId'});
      const walletChain = parseInt(wc, 16);
      if(walletChain !== chainId && CHAINS[walletChain]) {
        // Wallet is on a different supported chain — sync to it
        chainId = walletChain;
        localStorage.setItem('ms_chain', String(chainId));
        provider = makeProvider(chainId);
        updateNetButtons();
      }
    } catch(_) {}
  }
  loadMyWallets();
  if(!owners.length && document.getElementById('panel-create').classList.contains('active')) {
    owners.push(connectedAddress);
    renderOwners();
  }
}

function onWalletDisconnect() {
  signer = null; connectedAddress = null;
}

// --- Name resolution ---

const ethMainRpc = makeProvider(1);

async function resolveName(input) {
  const v = input.trim();
  if(!v) throw new Error('Empty input');
  if(ethers.isAddress(v)) return ethers.getAddress(v);

  if(v.endsWith('.wei')) {
    const ns = new ethers.Contract(WEINS, WEINS_ABI, ethMainRpc);
    const tokenId = await ns.computeId(v);
    const owner = await ns.ownerOf(tokenId);
    if(!owner || owner === ethers.ZeroAddress) throw new Error(`${v} not found`);
    return ethers.getAddress(owner);
  }

  if(v.endsWith('.eth')) {
    const addr = await ethMainRpc.resolveName(v);
    if(!addr) throw new Error(`${v} not found`);
    return ethers.getAddress(addr);
  }

  throw new Error('Enter an address, .eth, or .wei name');
}

// --- THEME ---
window.toggleDark = function() {
  const dark = !document.documentElement.classList.contains('dark');
  document.documentElement.classList.toggle('dark', dark);
  localStorage.setItem('dark', dark?'1':'0');
};

// --- NETWORK SWITCHING ---
function updateNetButtons() {
  document.querySelectorAll('.net-btn[data-chain]').forEach(b => b.classList.toggle('active', parseInt(b.dataset.chain)===chainId));
  document.querySelectorAll('.net-testnet').forEach(el => el.classList.toggle('show', testnetsVisible));
  const toggle = document.getElementById('testnetToggle');
  if(toggle) toggle.style.opacity = testnetsVisible ? '0.7' : '0.35';
}

window.switchNet = async function(id) {
  chainId = id;
  localStorage.setItem('ms_chain', String(id));
  provider = makeProvider(id);
  walletDbId = null;
  updateNetButtons();
  await walletSwitchChain({ chainId: id, chainHex: CHAINS[id].hex, rpc: CHAINS[id].rpcs[0], addChainParams: ADD_CHAIN_PARAMS[id] || null });
  loadMyWallets();
  if(msAddress) loadMultisig();
};

window.toggleTestnets = function() {
  testnetsVisible = !testnetsVisible;
  localStorage.setItem('ms_testnet', testnetsVisible?'1':'0');
  updateNetButtons();
};

// --- TAB / SUBTAB SWITCHING ---
window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.trim().toLowerCase()===tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id===`panel-${tab}`));
};

window.switchSubTab = function(tab) {
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.toggle('active', t.textContent.trim().toLowerCase()===tab));
  document.querySelectorAll('.sub-panel').forEach(p => p.classList.toggle('active', p.id===`sub-${tab}`));
};

window.toggleAdvanced = function() {
  const sec = document.getElementById('advancedSection');
  const btn = document.getElementById('advToggle');
  sec.classList.toggle('hidden');
  btn.textContent = sec.classList.contains('hidden') ? '+ delay' : '- delay';
};

// --- STATUS HELPERS ---
function showStatus(id, msg, ok) {
  const el = document.getElementById(id);
  el.className = 'status show ' + (ok?'ok':'err');
  el.innerHTML = msg;
}
function clearStatus(id) {
  const el = document.getElementById(id);
  el.className = 'status'; el.innerHTML = '';
}
function explorerLink(hash, type='address') {

window.addOwner = async function() {
  const input = document.getElementById('newOwnerInput');
  const raw = input.value.trim();
  if(!raw) return;
  try {
    input.disabled = true;
    const checksummed = await resolveName(raw);
    if(owners.includes(checksummed)) { input.disabled = false; return alert('Already added'); }
    owners.push(checksummed);
    owners.sort((a,b) => a.toLowerCase() < b.toLowerCase() ? -1 : 1);
    renderOwners();
    input.value = '';
  } catch(e) { alert(e.message); }
  input.disabled = false;
};

window.removeOwnerCreate = function(i) {
  owners.splice(i, 1);
  renderOwners();
};

// --- CREATE2 vanity mining ---

function buildInitcode(impl) {
  return '0x602d5f8160095f39f35f5f365f5f37365f73' + impl.slice(2).toLowerCase() + '5af43d5f5f3e6029573d5ffd5b3d5ff3';
}

async function mineVanitySalt(factory, impl, caller) {
  const hash = ethers.keccak256(buildInitcode(impl));
  const base = BigInt(caller) << 96n;
  for(let n = 0n; ; n++) {
    const salt = '0x' + (base | n).toString(16).padStart(64, '0');
    const addr = ethers.getCreate2Address(factory, salt, hash);
    if(addr.slice(2, 4) === '00') return { salt: base | n, address: addr, nonce: n };
    if(n > 0n && n % 5000n === 0n) await new Promise(r => setTimeout(r, 0));
  }
}

// --- CREATE — DEPLOY ---
window.deployMultisig = async function() {
  clearStatus('createStatus');
  if(!signer) return showStatus('createStatus', 'Connect wallet first', false);
  if(!owners.length) return showStatus('createStatus', 'Add at least one owner', false);

  const factoryAddr = FACTORY[chainId];
  if(!factoryAddr || factoryAddr === ethers.ZeroAddress) {
    return showStatus('createStatus', `Factory not deployed on ${CHAINS[chainId].name} yet`, false);
  }

  const thresh = Math.min(parseInt(document.getElementById('threshold').value) || 1, owners.length);
  const del = (parseInt(document.getElementById('delay').value) || 0) * 60;

  try {
    // 1. Read implementation address from factory
    showStatus('createStatus', 'Reading factory...', true);
    const factory = new ethers.Contract(factoryAddr, FACTORY_ABI, signer);
    const impl = await factory.implementation();

    // 2. Mine vanity salt (leading zero byte)
    showStatus('createStatus', 'Mining vanity address...', true);
    const result = await mineVanitySalt(factoryAddr, impl, connectedAddress);
    showStatus('createStatus',
      `Found: <span class="mono">${result.address}</span> (${result.nonce.toString()} attempts)<br>Deploying...`, true);

    // 3. Deploy — executor = zero, salt = mined
    const tx = await factory.create(owners, del, thresh, ethers.ZeroAddress, result.salt);
    showStatus('createStatus', `Tx: ${explorerLink(tx.hash, 'tx')}<br>Waiting for confirmation...`, true);
    const receipt = await tx.wait();

    // 4. Parse Created event
    const iface = new ethers.Interface(FACTORY_ABI);
    let walletAddr = null;
    for(const log of receipt.logs) {
      try { const parsed = iface.parseLog(log); if(parsed?.name === 'Created') { walletAddr = parsed.args[0]; break; } } catch(_){}
    }

    if(walletAddr) {
      // Register in Supabase
      try {
        await dbRegisterWallet(walletAddr, connectedAddress, result.salt, owners, thresh, del, ethers.ZeroAddress, Number(receipt.blockNumber), receipt.hash);
      } catch(e) { console.error('DB register failed:', e); }
      showStatus('createStatus',
        `Deployed: ${explorerLink(walletAddr)}<br><button class="sm secondary" onclick="document.getElementById('msAddr').value='${walletAddr}';switchTab('manage');loadMultisig();">manage &#8594;</button>`, true);
    } else {
      showStatus('createStatus', `Confirmed: ${explorerLink(receipt.hash, 'tx')}`, true);
    }
  } catch(e) {
    console.error(e);
    showStatus('createStatus', e.shortMessage || e.message, false);
  }
};

// --- MANAGE — LOAD MULTISIG ---
window.loadMultisig = async function() {
  const addr = document.getElementById('msAddr').value.trim();
  if(!ethers.isAddress(addr)) return alert('Invalid address');
  msAddress = ethers.getAddress(addr);
  localStorage.setItem('ms_addr_' + chainId, msAddress);
  history.replaceState(null, '', `#${chainId}/${msAddress}`);

  try {
    msContract = new ethers.Contract(msAddress, MULTISIG_ABI, provider);

    // Batched read via Multicall3
    const s = await multicallLoad(msAddress);
    loadedOwners = [...s.owners];

    document.getElementById('msBalance').textContent = ethers.formatEther(s.balance) + ' ETH';
    document.getElementById('msThreshold').textContent = `${s.threshold} of ${s.owners.length}`;
    document.getElementById('msDelay').textContent = s.delay == 0 ? 'none' : s.delay < 60 ? `${s.delay}s` : s.delay < 3600 ? `${s.delay/60}m` : `${s.delay/3600}h`;
    document.getElementById('msNonce').textContent = String(s.nonce);
    document.getElementById('msExecutor').textContent = s.executor === ethers.ZeroAddress ? 'none' : s.executor;
    document.getElementById('txNonce').value = String(s.nonce);

    // Detect TimelockExecutor — probe forwardEnabled to confirm it's the right contract
    isTimelockExecutor = false;
    tlForwardEnabled = false;
    if(s.executor !== ethers.ZeroAddress) {
      try {
        const tlContract = new ethers.Contract(s.executor, TIMELOCK_EXECUTOR_ABI, provider);
        tlForwardEnabled = await tlContract.forwardEnabled(msAddress);
        isTimelockExecutor = true; // call succeeded — it's a TimelockExecutor
      } catch(_) {}
    }
    if(isTimelockExecutor) {
      const label = tlForwardEnabled ? 'timelock executor (forward enabled)' : 'timelock executor (cancel only)';
      document.getElementById('msExecutor').textContent = label;
    }

    document.getElementById('msOwners').innerHTML = s.owners.map(o =>
      `<li class="owner-item"><span>${o}</span><button class="copy-btn" onclick="copyText('${o}')">copy</button></li>`
    ).join('');

    document.getElementById('msLoaded').classList.remove('hidden');
    document.getElementById('setRemoveOwner').innerHTML = s.owners.map(o =>
      `<option value="${o}">${o.slice(0,8)}...${o.slice(-6)}</option>`
    ).join('');
    collectedSigs = [];
    batchCalls = [];
    renderSigs();
    renderBatch();
    renderTokenRow();

    // Parallel: token balances, send balance, and DB context
    const [, , dbWallet] = await Promise.all([
      loadTokenBalances(msAddress, s.balance),
      updateSendBalance(),
      dbFindWallet(msAddress),
    ]);
    walletDbId = dbWallet?.id || null;
    if(walletDbId) loadPending();
    else document.getElementById('pendingSection').classList.add('hidden');
  } catch(e) {
    console.error(e);
    alert('Failed to load: ' + (e.shortMessage || e.message));
  }
};

};

// Build send tx: reads form into target/value/data fields
window.buildSendTx = async function() {
  if(!sendMode || !selectedToken) return computeHash();
  try {
    showStatus('txStatus', 'Resolving...', true);
    const call = await readCallFromForm();
    document.getElementById('txTarget').value = call.target;
    document.getElementById('txValue').value = ethers.formatEther(call.value);
    document.getElementById('txData').value = call.data;
    clearStatus('txStatus');
  } catch(e) { return showStatus('txStatus', e.message, false); }
  computeHash();
};

// --- Batch ---

let batchCalls = []; // [{target, value, data, label}]

function renderBatch() {
  const sec = document.getElementById('batchSection');
  const list = document.getElementById('batchList');
  if(!batchCalls.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  document.getElementById('batchCount').textContent = `(${batchCalls.length} call${batchCalls.length>1?'s':''})`;
  list.innerHTML = batchCalls.map((c, i) =>
    `<li class="owner-item"><span>${_esc(c.label)}</span><button onclick="removeBatchCall(${i})">&#215;</button></li>`
  ).join('');
}

window.removeBatchCall = function(i) { batchCalls.splice(i, 1); renderBatch(); };
window.clearBatch = function() { batchCalls = []; renderBatch(); };

// Read current form inputs into a {target, value, data, label} call
async function readCallFromForm() {
  if(sendMode) {
    const raw = document.getElementById('sendTo').value.trim();
    const amount = document.getElementById('sendAmount').value.trim();
    if(!raw || !amount || isNaN(Number(amount))) throw new Error('Fill in amount and recipient');
    const to = await resolveName(raw);
    if(selectedToken.address === ethers.ZeroAddress) {
      return { target: to, value: ethers.parseEther(amount).toString(), data: '0x', label: `${amount} ETH → ${to.slice(0,8)}...` };
    } else {
      const parsed = ethers.parseUnits(amount, selectedToken.decimals);
      const calldata = erc20Iface.encodeFunctionData('transfer', [to, parsed]);
      return { target: selectedToken.address, value: '0', data: calldata, label: `${amount} ${selectedToken.symbol} → ${to.slice(0,8)}...` };
    }
  } else {
    const target = document.getElementById('txTarget').value.trim();
    const value = document.getElementById('txValue').value.trim() || '0';
    const data = document.getElementById('txData').value.trim() || '0x';
    if(!ethers.isAddress(target)) throw new Error('Invalid target');
    return { target, value: ethers.parseEther(value).toString(), data, label: `${target.slice(0,10)}... ${value} ETH` };
  }
}

window.addToBatch = async function() {
  clearStatus('txStatus');
  try {
    showStatus('txStatus', 'Resolving...', true);
    const call = await readCallFromForm();
    batchCalls.push(call);
    renderBatch();
    clearStatus('txStatus');
    // Clear form for next entry
    if(sendMode) { document.getElementById('sendAmount').value = ''; document.getElementById('sendTo').value = ''; }
    else { document.getElementById('txTarget').value = ''; document.getElementById('txValue').value = ''; document.getElementById('txData').value = ''; }
  } catch(e) { showStatus('txStatus', e.message, false); }
};

// Finalize: if batch has calls, encode as batch() self-call.
// If single call or no batch, use the form directly.
function finalizeTx() {
  if(batchCalls.length > 1) {
    const targets = batchCalls.map(c => c.target);
    const values = batchCalls.map(c => c.value);
    const datas = batchCalls.map(c => c.data);
    document.getElementById('txTarget').value = msAddress;
    document.getElementById('txValue').value = '0';
    document.getElementById('txData').value = msIface.encodeFunctionData('batch', [targets, values, datas]);
  } else if(batchCalls.length === 1) {
    const c = batchCalls[0];
    document.getElementById('txTarget').value = c.target;
    document.getElementById('txValue').value = ethers.formatEther(c.value);
    document.getElementById('txData').value = c.data;
  }
  // else: use form values as-is (direct entry)
}

// --- TRANSACT — HASH / SIGN / EXECUTE ---
const EIP712_DOMAIN = { name:'Multisig', version:'1' };
const EIP712_TYPES = { Execute: [
  { name:'target', type:'address' }, { name:'value', type:'uint256' },
  { name:'data', type:'bytes' }, { name:'nonce', type:'uint32' },
]};

function computeHash() {
  try {
    const target = document.getElementById('txTarget').value.trim();
    const value = ethers.parseEther(document.getElementById('txValue').value.trim() || '0');
    const data = document.getElementById('txData').value.trim() || '0x';
    const nonce = parseInt(document.getElementById('txNonce').value) || 0;
    const domain = { ...EIP712_DOMAIN, chainId, verifyingContract: msAddress };
    const hash = ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, { target, value, data, nonce });
    document.getElementById('txHash').textContent = hash;
    document.getElementById('approveHash').value = hash;
  } catch(e) {
    document.getElementById('txHash').textContent = '';
  }
}

window.signTx = async function() {
  clearStatus('txStatus');
  if(!signer) return showStatus('txStatus', 'Connect wallet first', false);
  if(!msAddress) return showStatus('txStatus', 'Load a multisig first', false);

  if(batchCalls.length) finalizeTx();
  else if(sendMode) await buildSendTx();

  try {
    const target = document.getElementById('txTarget').value.trim();
    if(!target) return showStatus('txStatus', 'Add a call first', false);
    const value = ethers.parseEther(document.getElementById('txValue').value.trim() || '0');
    const data = document.getElementById('txData').value.trim() || '0x';
    const nonce = parseInt(document.getElementById('txNonce').value) || 0;

    const domain = { ...EIP712_DOMAIN, chainId, verifyingContract: msAddress };
    const msg = { target, value, data, nonce };
    const sig = await signer.signTypedData(domain, EIP712_TYPES, msg);

    const signerAddr = connectedAddress;
    const existing = collectedSigs.findIndex(s => s.signer.toLowerCase() === signerAddr.toLowerCase());
    if(existing >= 0) collectedSigs[existing] = {signer: signerAddr, sig};
    else collectedSigs.push({signer: signerAddr, sig});

    collectedSigs.sort((a,b) => a.signer.toLowerCase() < b.signer.toLowerCase() ? -1 : 1);
    renderSigs();
    computeHash();

    // Persist to DB
    if(walletDbId) {
      const txHash = document.getElementById('txHash').textContent;
      let dbTx = await dbGetTxByHash(txHash);
      if(!dbTx) {
        const thresh = parseInt(document.getElementById('msThreshold').textContent) || 1;
        const txId = await dbProposeTx(walletDbId, nonce, target.toString(), value.toString(), data, txHash, thresh, connectedAddress);
        if(txId) dbTx = { id: txId };
      }
      if(dbTx) await dbAddSig(dbTx.id, signerAddr, sig);
      loadPending();
    }

    showStatus('txStatus', `Signed by ${signerAddr.slice(0,8)}...`, true);
  } catch(e) {
    console.error(e);
    showStatus('txStatus', e.shortMessage || e.message, false);
  }
};

window.addSig = function() {
  const input = document.getElementById('pasteSig');
  const sig = input.value.trim();
  if(!sig || sig.length !== 132) return alert('Signature must be 132 hex chars (0x + 130)');

  try {
    const r = sig.slice(0, 66);
    const v = parseInt('0x' + sig.slice(130, 132));

    if(v === 0) {
      const signerAddr = ethers.getAddress('0x' + r.slice(26));
      const existing = collectedSigs.findIndex(s => s.signer.toLowerCase() === signerAddr.toLowerCase());
      if(existing >= 0) collectedSigs[existing] = {signer: signerAddr, sig};
      else collectedSigs.push({signer: signerAddr, sig});
    } else {
      collectedSigs.push({signer: '(verify order)', sig});
    }

    collectedSigs.sort((a,b) => {
      if(a.signer.startsWith('(')) return 1;
      if(b.signer.startsWith('(')) return -1;
      return a.signer.toLowerCase() < b.signer.toLowerCase() ? -1 : 1;
    });
    renderSigs();
    input.value = '';
  } catch(e) { alert('Invalid signature'); }
};

function renderSigs() {
  const list = document.getElementById('sigList');
  list.innerHTML = collectedSigs.map((s,i) =>
    `<div class="sig-item"><div><span class="sig-signer">${s.signer}</span><br>${s.sig.slice(0,22)}...${s.sig.slice(-8)}</div><button class="add-btn" onclick="removeSig(${i})">&#215;</button></div>`
  ).join('') || '<span class="dim small">no signatures collected</span>';
  document.getElementById('sigCount').textContent = `(${collectedSigs.length})`;
}

window.removeSig = function(i) { collectedSigs.splice(i,1); renderSigs(); };

// Build a v=0 sender-bypass signature: address packed into r, s=0, v=0
function senderSig(addr) {
  return '0x' + addr.slice(2).toLowerCase().padStart(64, '0') + '0'.repeat(64) + '00';
}

window.executeTx = async function() {
  clearStatus('txStatus');
  if(!signer) return showStatus('txStatus', 'Connect wallet first', false);
  if(!msAddress) return showStatus('txStatus', 'Load a multisig first', false);

  if(batchCalls.length) finalizeTx();
  else if(sendMode) await buildSendTx();

  try {
    const target = document.getElementById('txTarget').value.trim();
    if(!target) return showStatus('txStatus', 'Add a call first', false);
    const value = ethers.parseEther(document.getElementById('txValue').value.trim() || '0');
    const data = document.getElementById('txData').value.trim() || '0x';

    // Auto-inject sender-bypass sig if caller is owner and hasn't signed
    const callerIsOwner = loadedOwners.some(o => o.toLowerCase() === connectedAddress.toLowerCase());
    const callerHasSigned = collectedSigs.some(s => s.signer.toLowerCase() === connectedAddress.toLowerCase());
    if(callerIsOwner && !callerHasSigned) {
      collectedSigs.push({ signer: connectedAddress, sig: senderSig(connectedAddress) });
      collectedSigs.sort((a,b) => a.signer.toLowerCase() < b.signer.toLowerCase() ? -1 : 1);
      renderSigs();
    }

    let sigs = '0x';
    for(const s of collectedSigs) sigs += s.sig.slice(2);

    const ms = new ethers.Contract(msAddress, MULTISIG_ABI, signer);

    // Route through TimelockExecutor when conditions are met
    const sigCount = collectedSigs.length;
    const isCancelCall = isTimelockExecutor
      && target.toLowerCase() === msAddress.toLowerCase()
      && data.length >= 10 && data.slice(0, 10) === msIface.getFunction('cancelQueued').selector;
    const canCancel = isCancelCall && sigCount >= Number(await ms.threshold());
    const canForward = isTimelockExecutor && tlForwardEnabled && sigCount === loadedOwners.length && !isCancelCall;

    let tx;
    if(canCancel || canForward) {
      const label = canCancel ? 'Cancelling via executor (immediate)...' : 'Forwarding via executor (immediate)...';
      showStatus('txStatus', label, true);
      const executorAddr = await ms.executor();
      const tlContract = new ethers.Contract(executorAddr, TIMELOCK_EXECUTOR_ABI, signer);
      // For cancel, trim to exactly threshold sigs (module requires exact match)
      let forwardSigs = sigs;
      if(canCancel) {
        const thresh = Number(await ms.threshold());
        const trimmed = collectedSigs.slice(0, thresh);
        forwardSigs = '0x';
        for(const s of trimmed) forwardSigs += s.sig.slice(2);
      }
      tx = await tlContract.forward(msAddress, target, value, data, forwardSigs);
    } else {
      showStatus('txStatus', 'Sending transaction...', true);
      tx = await ms.execute(target, value, data, sigs, {value: 0});
    }
    showStatus('txStatus', `Tx: ${explorerLink(tx.hash, 'tx')}<br>Waiting...`, true);
    const receipt = await tx.wait();

    const dbTx = await dbGetTxByHash(document.getElementById('txHash').textContent);
    let result = 'Confirmed';
    for(const log of receipt.logs) {
      try {
        let parsed = msIface.parseLog(log);
        if(!parsed) parsed = tlIface.parseLog(log);
        if(parsed?.name === 'ExecutionSuccess') {
          result = `Executed (nonce ${parsed.args[1]})`;
          if(dbTx) await dbMarkExecuted(dbTx.id, Number(receipt.blockNumber), receipt.hash);
        }
        if(parsed?.name === 'Queued') {
          const eta = Number(parsed.args[2]);
          result = `Queued &#8212; ETA: ${new Date(eta * 1000).toLocaleString()}`;
          if(dbTx) await dbMarkQueued(dbTx.id, eta, Number(receipt.blockNumber));
        }
        if(parsed?.name === 'Forwarded') {
          result = `Forwarded (immediate)`;
          if(dbTx) await dbMarkExecuted(dbTx.id, Number(receipt.blockNumber), receipt.hash);
        }
      } catch(_){}
    }

    showStatus('txStatus', `${result}<br>${explorerLink(receipt.hash, 'tx')}`, true);
    if(walletDbId) dbSyncWalletState();
    loadMultisig();
  } catch(e) {
    console.error(e);
    showStatus('txStatus', e.shortMessage || e.message, false);
  }
};

window.checkQueued = async function() {
  if(!msContract) return;
  const hash = document.getElementById('queueHash').value.trim();
  if(!hash) return;
  try {
    const eta = await msContract.queued(hash);
    if(eta == 0n) {
      document.getElementById('queueEta').textContent = 'not queued';
    } else {
      const date = new Date(Number(eta) * 1000);
      const ready = Date.now() >= Number(eta) * 1000;
      document.getElementById('queueEta').textContent = `ETA: ${date.toLocaleString()} ${ready ? '(ready)' : '(pending)'}`;
      document.getElementById('queueEta').style.color = ready ? 'var(--success)' : 'var(--fg-muted)';
    }
  } catch(e) {
    document.getElementById('queueEta').textContent = 'error';
  }
};

window.cancelQueued = async function() {
  clearStatus('queueStatus');
  if(!signer) return showStatus('queueStatus', 'Connect wallet first', false);
  if(!msAddress) return showStatus('queueStatus', 'Load a multisig first', false);

  const hash = document.getElementById('cancelHash').value.trim();
  if(!hash) return showStatus('queueStatus', 'Enter tx hash', false);

  if(isTimelockExecutor) {
    // Route cancel through TimelockExecutor — needs threshold sigs
    // Build the cancel calldata and pre-fill the transact form
    const cancelData = msIface.encodeFunctionData('cancelQueued', [hash]);
    if(sendMode) toggleTxMode();
    document.getElementById('txTarget').value = msAddress;
    document.getElementById('txValue').value = '0';
    document.getElementById('txData').value = cancelData;
    collectedSigs = [];
    renderSigs();
    computeHash();
    showSubPanel('sub-transact');
    showStatus('queueStatus', 'Cancel requires threshold sigs — sign & execute in transact tab. Will route through executor for immediate cancel.', true);
    return;
  }

  // Fallback: build self-call via execute (for non-TimelockExecutor executors)
  try {
    const cancelData = msIface.encodeFunctionData('cancelQueued', [hash]);
    if(sendMode) toggleTxMode();
    document.getElementById('txTarget').value = msAddress;
    document.getElementById('txValue').value = '0';
    document.getElementById('txData').value = cancelData;
    collectedSigs = [];
    renderSigs();
    computeHash();
    showSubPanel('sub-transact');
    showStatus('queueStatus', 'Cancel is a self-call — sign & execute in transact tab (will be timelocked).', true);
  } catch(e) {
    console.error(e);
    showStatus('queueStatus', e.shortMessage || e.message, false);
  }
};

// --- SETTINGS — BUILD SELF-CALL TX ---
window.buildSettingsTx = async function(action) {
  clearStatus('settingsStatus');
  if(!msAddress) return showStatus('settingsStatus', 'Load a multisig first', false);

  let data;
  try {
    switch(action) {
      case 'addOwner': {
        const raw = document.getElementById('setAddOwner').value.trim();
        if(!raw) return showStatus('settingsStatus', 'Enter an address or name', false);
        showStatus('settingsStatus', 'Resolving...', true);
        const addr = await resolveName(raw);
        data = msIface.encodeFunctionData('addOwner', [addr]);
        break;
      }
      case 'removeOwner': {
        const target = document.getElementById('setRemoveOwner').value;
        if(!target) return showStatus('settingsStatus', 'Select an owner', false);
        const idx = loadedOwners.findIndex(o => o.toLowerCase() === target.toLowerCase());
        if(idx < 0) return showStatus('settingsStatus', 'Not an owner', false);
        const prevOwner = idx === 0 ? SENTINEL : loadedOwners[idx - 1];
        data = msIface.encodeFunctionData('removeOwner', [prevOwner, target]);
        break;
      }
      case 'setThreshold': {
        const val = parseInt(document.getElementById('setThreshold').value);
        if(!val || val < 1 || val > loadedOwners.length) return showStatus('settingsStatus', `Threshold must be 1-${loadedOwners.length}`, false);
        data = msIface.encodeFunctionData('setThreshold', [val]);
        break;
      }
      case 'setDelay': {
        const val = parseInt(document.getElementById('setDelay').value);
        if(isNaN(val) || val < 0) return showStatus('settingsStatus', 'Invalid delay', false);
        data = msIface.encodeFunctionData('setDelay', [val * 60]);
        break;
      }
      case 'addExecutor': {
        const addr = document.getElementById('setExecutor').value.trim();
        if(!ethers.isAddress(addr)) return showStatus('settingsStatus', 'Invalid address', false);
        data = msIface.encodeFunctionData('setExecutor', [ethers.getAddress(addr)]);
        break;
      }
      case 'removeExecutor': {
        data = msIface.encodeFunctionData('setExecutor', [ethers.ZeroAddress]);
        break;
      }
      default: return;
    }

    // Switch to custom call mode and fill
    if(sendMode) toggleTxMode();
    document.getElementById('txTarget').value = msAddress;
    document.getElementById('txValue').value = '0';
    document.getElementById('txData').value = data;
    switchSubTab('transact');
    computeHash();
    showStatus('settingsStatus', `Calldata built &#8212; sign & execute in transact tab`, true);
  } catch(e) {
    console.error(e);
    showStatus('settingsStatus', e.shortMessage || e.message, false);
  }
};

async function dbSyncWalletState() {
  if(!walletDbId || !msAddress) return;
  try {
    const s = await multicallLoad(msAddress);
    await sb.from('wallets').update({
      threshold: Number(s.threshold),
      owner_count: Number(s.ownerCount),
      delay: Number(s.delay),
      executor: s.executor,
      nonce: Number(s.nonce),
    }).eq('id', walletDbId);
    // Sync owners: mark removed, add new
    const { data: dbOwners } = await sb.from('owners').select('address').eq('wallet_id', walletDbId).eq('is_current', true);
    const dbSet = new Set((dbOwners||[]).map(o => o.address.toLowerCase()));
    const chainSet = new Set(s.owners.map(o => o.toLowerCase()));
    for(const o of dbOwners||[]) {
      if(!chainSet.has(o.address.toLowerCase())) {
        await sb.from('owners').update({ is_current: false, removed_at: new Date().toISOString() })
          .eq('wallet_id', walletDbId).eq('address', o.address).eq('is_current', true);
      }
    }
    for(let i = 0; i < s.owners.length; i++) {
      if(!dbSet.has(s.owners[i].toLowerCase())) {
        await sb.from('owners').insert({ wallet_id: walletDbId, address: s.owners[i], position: i, is_current: true });
      }
    }
  } catch(e) { console.error('DB sync:', e); }
}

// --- Multicall3 batched reads ---

async function multicallLoad(addr) {
  const ms = new ethers.Contract(addr, MULTISIG_ABI, provider);

  // Anvil / local chains won't have Multicall3 — use direct calls
  if(chainId === 31337) {
    const [threshold, delay, nonce, executor, ownerCount, owners, balance] = await Promise.all([
      ms.threshold(), ms.delay(), ms.nonce(), ms.executor(), ms.ownerCount(), ms.getOwners(), provider.getBalance(addr)
    ]);
    return { threshold, delay, nonce, executor, ownerCount, owners, balance };
  }

  const mc = new ethers.Contract(MC3, MC3_ABI, provider);
  const encode = fn => ({ target: addr, allowFailure: false, callData: msIface.encodeFunctionData(fn) });
  const fns = ['threshold','delay','nonce','executor','ownerCount','getOwners'];
  const [results, balance] = await Promise.all([mc.aggregate3(fns.map(encode)), provider.getBalance(addr)]);
  const d = (fn, i) => msIface.decodeFunctionResult(fn, results[i].returnData)[0];
  return { threshold:d('threshold',0), delay:d('delay',1), nonce:d('nonce',2), executor:d('executor',3), ownerCount:d('ownerCount',4), owners:d('getOwners',5), balance };
}

// --- Token balances (batched via Multicall3) ---

async function loadTokenBalances(walletAddr, ethBalance) {
  const el = document.getElementById('tokenBalances');
  if(!el) return;
  const allTokens = TOKENS[chainId] || ETH_ONLY;
  const erc20Tokens = allTokens.filter(t => t.address !== ethers.ZeroAddress);
  if(!erc20Tokens.length) { el.innerHTML = ''; return; }

  try {
    // Build batched calls: ERC20 balances + Chainlink price feeds
    const feeds = CHAINLINK_FEEDS[chainId] || {};
    const feedSymbols = Object.keys(feeds);
    const latestAnswerData = clIface.encodeFunctionData('latestAnswer');

    let balances, prices = {};

    if(chainId === 31337) {
      balances = await Promise.all(erc20Tokens.map(async t => {
        try {
          const c = new ethers.Contract(t.address, ERC20_ABI, provider);
          return { success: true, bal: await c.balanceOf(walletAddr) };
        } catch(_) { return { success: false, bal: 0n }; }
      }));
    } else {
      const mc = new ethers.Contract(MC3, MC3_ABI, provider);
      const balCalls = erc20Tokens.map(t => ({
        target: t.address, allowFailure: true,
        callData: erc20Iface.encodeFunctionData('balanceOf', [walletAddr])
      }));
      const priceCalls = feedSymbols.map(sym => ({
        target: feeds[sym], allowFailure: true,
        callData: latestAnswerData
      }));
      const results = await mc.aggregate3([...balCalls, ...priceCalls]);

      balances = results.slice(0, balCalls.length).map(r => ({
        success: r.success,
        bal: r.success ? erc20Iface.decodeFunctionResult('balanceOf', r.returnData)[0] : 0n
      }));
      results.slice(balCalls.length).forEach((r, i) => {
        if(r.success) {
          const answer = clIface.decodeFunctionResult('latestAnswer', r.returnData)[0];
          prices[feedSymbols[i]] = Number(answer) / 1e8; // Chainlink USD feeds use 8 decimals
        }
      });
    }

    // Use passed-in ETH balance (already fetched by multicallLoad), fallback to direct call
    if(ethBalance == null) ethBalance = await provider.getBalance(walletAddr);
    const ethPrice = prices['ETH'] || 0;
    const stableSymbols = new Set(['USDC', 'USDT', 'DAI']);
    let totalUsd = 0;

    // ETH row
    if(ethBalance > 0n) {
      const ethAmount = Number(ethers.formatEther(ethBalance));
      const ethUsd = ethPrice > 0 ? ethAmount * ethPrice : 0;
      totalUsd += ethUsd;
    }

    const rows = erc20Tokens.map((t, i) => {
      if(!balances[i].success || balances[i].bal === 0n) return '';
      const formatted = ethers.formatUnits(balances[i].bal, t.decimals);
      const amount = Number(formatted);
      const display = t.decimals <= 8 ? amount.toFixed(2) : amount.toFixed(4).replace(/\.?0+$/, '');

      let usdStr = '';
      if(stableSymbols.has(t.symbol)) {
        totalUsd += amount;
        usdStr = ` <span class="dim small">$${amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</span>`;
      } else if(prices[t.symbol]) {
        const usd = amount * prices[t.symbol];
        totalUsd += usd;
        usdStr = ` <span class="dim small">$${usd.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</span>`;
      }
      return `<div class="info-row"><span class="info-label">${t.icon || ''}${t.symbol}</span><span class="info-value">${display}${usdStr}</span></div>`;
    }).filter(Boolean);

    // Update ETH balance display with USD if available
    const ethEl = document.getElementById('msBalance');
    if(ethEl && ethBalance > 0n) {
      const ethAmount = Number(ethers.formatEther(ethBalance));
      const ethUsd = ethPrice > 0 ? ` <span class="dim small">($${(ethAmount * ethPrice).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})})</span>` : '';
      ethEl.innerHTML = ethers.formatEther(ethBalance).slice(0, 10) + ` ETH${ethUsd}`;
    }

    // Total USD
    if(totalUsd > 0) {
      rows.unshift(`<div class="info-row"><span class="info-label" style="font-weight:600">total</span><span class="info-value" style="font-weight:600">$${totalUsd.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</span></div>`);
    }

    el.innerHTML = rows.join('');
  } catch(e) {
    console.error('Token balances:', e);
    el.innerHTML = '';
  }
}

// --- My wallets UI ---

async function loadMyWallets() {
  if(!connectedAddress) return;
  const sec = document.getElementById('myWalletsSection');
  const list = document.getElementById('myWalletsList');
  const label = document.getElementById('addrInputLabel');
  try {
    const wallets = await dbMyWallets(connectedAddress);
    if(!wallets.length) {
      sec.classList.add('hidden');
      label.textContent = 'multisig address';
      return;
    }
    sec.classList.remove('hidden');
    label.textContent = 'or load by address';

      `<li class="wallet-item" onclick="document.getElementById('msAddr').value='${w.address}';loadMultisig();">
        <span>${w.address.slice(0,8)}...${w.address.slice(-6)}</span>
        <span class="dim">${w.threshold}/${w.owner_count}</span>
      </li>`
    ).join('');
  } catch(e) {
    console.error('loadMyWallets:', e);
    sec.classList.add('hidden');
    label.textContent = 'multisig address';
  }
}

// --- Pending proposals UI ---

function formatEta(eta) {
  if(!eta) return '';
  const diff = eta * 1000 - Date.now();
  if(diff <= 0) return 'ready';
  const m = Math.ceil(diff / 60000);
  if(m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  return h < 24 ? `${h}h ${m % 60}m` : `${Math.floor(h / 24)}d ${h % 24}h`;
}

async function loadPending() {
  if(!walletDbId) return;
  const txs = await dbGetPending(walletDbId);
  const sec = document.getElementById('pendingSection');
  const list = document.getElementById('pendingList');
  if(!txs.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');

  // Batch-fetch signers for all pending txs
  const txIds = txs.map(t => t.id);
  const { data: allSigs } = await sb.from('signatures').select('tx_id, signer').in('tx_id', txIds);
  const sigMap = {};
  for(const s of (allSigs || [])) { (sigMap[s.tx_id] = sigMap[s.tx_id] || []).push(s.signer); }

  const youNeedToSign = connectedAddress ? connectedAddress.toLowerCase() : null;

  list.innerHTML = txs.map(t => {
    const signers = sigMap[t.id] || [];
    const sigLabel = `${signers.length}/${t.sigs_needed}`;
    const youSigned = youNeedToSign && signers.some(s => s.toLowerCase() === youNeedToSign);

    let badge = '';
    if(t.status === 'queued' && t.queue_ready) badge = '<span style="color:var(--success)">execute now</span>';
    else if(t.status === 'queued') badge = `<span>locked ${formatEta(t.eta)}</span>`;
    else if(signers.length >= (t.sigs_needed || 1)) badge = '<span style="color:var(--success)">ready</span>';
    else if(youNeedToSign && !youSigned) badge = `<span>${sigLabel} &middot; sign</span>`;
    else badge = `<span>${sigLabel} sigs</span>`;

    const signerList = signers.map(s => s.slice(0,6)+'..').join(', ');

    return `<li class="pending-item" onclick="loadProposal('${_esc(t.id)}')">
      <div class="pending-row">
        <span>#${t.nonce} ${t.target ? t.target.slice(0,10)+'...' : ''}</span>
        <span class="pending-sigs">${badge}</span>
      </div>
      ${signerList ? `<span class="pending-desc">signed: ${_esc(signerList)}</span>` : ''}
      ${t.description ? `<span class="pending-desc">${_esc(t.description)}</span>` : ''}
    </li>`;
  }).join('');
}

window.loadProposal = async function(txId) {
  const { data: tx } = await sb.from('transactions')
    .select('*').eq('id', txId).single();
  if(!tx) return;

  if(tx.status === 'queued') {
    // Queued tx — fill the queue execute form and switch to queue tab
    document.getElementById('qTarget').value = tx.target;
    document.getElementById('qValue').value = ethers.formatEther(BigInt(tx.value));
    document.getElementById('qData').value = tx.call_data;
    document.getElementById('qNonce').value = tx.nonce;
    document.getElementById('queueHash').value = tx.tx_hash;
    checkQueued();
    switchSubTab('queue');
  } else {
    // Proposed — fill transact form
    if(sendMode) toggleTxMode();
    document.getElementById('txTarget').value = tx.target;
    document.getElementById('txValue').value = ethers.formatEther(BigInt(tx.value));
    document.getElementById('txData').value = tx.call_data;
    document.getElementById('txNonce').value = tx.nonce;
    document.getElementById('txHash').textContent = tx.tx_hash;
    document.getElementById('approveHash').value = tx.tx_hash;
    const sigs = await dbGetSigs(txId);
    collectedSigs = sigs.map(s => ({ signer: s.signer, sig: s.signature }));
    renderSigs();
    switchSubTab('transact');
  }
};

// --- INIT ---
(function init() {
  if(!CHAINS[chainId]) chainId = 1;
  provider = makeProvider(chainId);
  updateNetButtons();
  walletInit({
    appName: 'Multisig',
    chainId: chainId,
    chainHex: CHAINS[chainId].hex,
    rpc: CHAINS[chainId].rpcs[0],
    addChainParams: ADD_CHAIN_PARAMS[chainId] || null,
    onConnect: [onWalletConnect],
    onDisconnect: [onWalletDisconnect],
  });
  renderOwners();
  renderSigs();

  document.getElementById('threshold').addEventListener('input', function() {
    const max = owners.length || 1;
    if(parseInt(this.value) > max) this.value = max;
    if(parseInt(this.value) < 1) this.value = 1;
  });

  // Deep link: #chainId/0xAddress
  const hash = location.hash.slice(1);
  const match = hash.match(/^(\d+)\/(0x[0-9a-fA-F]{40})$/);
  if(match) {
    const linkChain = parseInt(match[1]);
    if(CHAINS[linkChain]) {
      chainId = linkChain;
      localStorage.setItem('ms_chain', String(chainId));
      provider = makeProvider(chainId);
      updateNetButtons();
      document.getElementById('msAddr').value = match[2];
      switchTab('manage');
      setTimeout(() => loadMultisig(), 500);
    }
  } else {
    const savedMs = localStorage.getItem('ms_addr_' + chainId);
    if(savedMs) document.getElementById('msAddr').value = savedMs;
  }

  document.getElementById('msAddr').addEventListener('change', function() {
    if(this.value.trim()) localStorage.setItem('ms_addr_' + chainId, this.value.trim());
  });
})();
</script>
