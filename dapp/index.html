async function prodSubmitBatch() {
  const signer = window._signer;
  const connectedAddress = window._connectedAddress;
  if(!signer) { flash('CONNECT WALLET FIRST'); return; }
  const v = S.vaults[S.sel];
  if(!v) return;

  const calls = S.batch.filter(c => c.t.trim());
  if(!calls.length) { flash('ADD AT LEAST 1 CALL'); return; }

  try {
    const targets = [];
    const values = [];
    const datas = [];
    for(const c of calls) {
      const addr = await resolveName(c.t);
      targets.push(addr);
      values.push(ethers.parseEther(c.v || '0'));
      datas.push(c.d || '0x');
    }

    const batchData = msIface.encodeFunctionData('batch', [targets, values, datas]);
    const target = v.address;
    const value = '0';

    const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
    const nonce = nextNonce(v);
    const msg = { target, value: 0n, data: batchData, nonce };
    const sig = await signer.signTypedData(domain, EIP712_TYPES, msg);
    const txHash = ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, msg);

    if(v.dbId) {
      const txId = await dbProposeTx(v.dbId, nonce, target, value, batchData, txHash, v.threshold, connectedAddress, `Batch (${calls.length} calls)`);
      if(txId) await dbAddSig(txId, connectedAddress, sig);
    }

    flash(`BATCH TX #${nonce} CREATED`);
    S.showTx = false;
    S.batch = [{t:'',v:'',d:''},{t:'',v:'',d:''}];
    await reloadQueue(S.sel);
  } catch(e) {
    console.error(e);
    flash(e.shortMessage || e.message || 'FAILED');
  }
}

// ── PRODUCTION: ADMIN PROPOSALS ───────────────────────────────────

async function prodAdminPropose(action, val) {
  const signer = window._signer;
  const connectedAddress = window._connectedAddress;
  if(!signer) { flash('CONNECT WALLET FIRST'); return; }
  const v = S.vaults[S.sel];
  if(!v) return;

  let data, desc;
  try {
    switch(action) {
      case 'setThreshold': {
        data = msIface.encodeFunctionData('setThreshold', [val]);
        desc = `setThreshold(${val})`;
        break;
      }
      case 'setDelay': {
        data = msIface.encodeFunctionData('setDelay', [val]);
        desc = `setDelay(${val})`;
        break;
      }
      case 'setExecutor': {
        const addr = document.getElementById('admin-executor-input')?.value?.trim();
        if(!addr || !ethers.isAddress(addr)) { flash('INVALID ADDRESS'); return; }
        data = msIface.encodeFunctionData('setExecutor', [ethers.getAddress(addr)]);
        desc = `setExecutor(${addr.slice(0,10)}...)`;
        break;
      }
      case 'enableForward': {
        const newState = !v.fastPath;
        data = tlIface.encodeFunctionData('enableForward', [newState]);
        desc = `enableForward(${newState})`;
        // For enableForward, target is the executor, not self
        const target = v.executor;
        const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
        const nonce = nextNonce(v);
        const msg = { target, value: 0n, data, nonce };
        const sig = await signer.signTypedData(domain, EIP712_TYPES, msg);
        const txHash = ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, msg);
        if(v.dbId) {
          const txId = await dbProposeTx(v.dbId, nonce, target, '0', data, txHash, v.threshold, connectedAddress, desc);
          if(txId) await dbAddSig(txId, connectedAddress, sig);
        }
        flash(`PROPOSE: ${desc}`);
        await reloadQueue(S.sel);
        return;
      }
      case 'addOwner': {
        const raw = document.getElementById('admin-add-owner')?.value?.trim();
        if(!raw) { flash('ENTER AN ADDRESS'); return; }
        const addr = await resolveName(raw);
        const addLabel = document.getElementById('admin-add-label')?.value?.trim() || '';
        data = msIface.encodeFunctionData('addOwner', [addr]);
        desc = `addOwner(${addr.slice(0,10)}...)`;
        // Store label so it can be applied after execution
        v._pendingLabel = { addr: addr.toLowerCase(), label: addLabel };
        break;
      }
      case 'removeOwner': {
        const idx = val;
        const ownerAddr = v.owners[idx]?.addr;
        if(!ownerAddr) { flash('INVALID OWNER'); return; }
        const loadedIdx = v.loadedOwners ? v.loadedOwners.findIndex(o => o.toLowerCase() === ownerAddr.toLowerCase()) : -1;
        const prevOwner = loadedIdx <= 0 ? SENTINEL : v.loadedOwners[loadedIdx - 1];
        data = msIface.encodeFunctionData('removeOwner', [prevOwner, ownerAddr]);
        desc = `removeOwner(${ownerAddr.slice(0,10)}...)`;
        break;
      }
      default: return;
    }

    // Self-call for settings changes
    const target = v.address;
    const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
    const nonce = nextNonce(v);
    const msg = { target, value: 0n, data, nonce };
    const sig = await signer.signTypedData(domain, EIP712_TYPES, msg);
    const txHash = ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, msg);

    if(v.dbId) {
      const txId = await dbProposeTx(v.dbId, nonce, target, '0', data, txHash, v.threshold, connectedAddress, desc);
      if(txId) await dbAddSig(txId, connectedAddress, sig);
    }

    flash(`PROPOSE: ${desc}`);
    await reloadQueue(S.sel);
  } catch(e) {
    console.error(e);
    flash(e.shortMessage || e.message || 'FAILED');
  }
}

// ── CHAIN SWITCHING ───────────────────────────────────────────────

async function switchChain(id, skipLoad) {
  if(!CHAINS[id]) return;
  S.chainId = id;
  localStorage.setItem('ms_chain', String(id));
  provider = makeProvider(id);
  S.showChains = false;
  S.latestBlock = 0;
  fetchBlock();

  // Ask wallet to switch chain
  if(window._connectedWalletProvider) {
    try {
      await walletSwitchChain({
        chainId: id,
        chainHex: CHAINS[id].hex,
        rpc: CHAINS[id].rpcs[0],
        addChainParams: ADD_CHAIN_PARAMS[id] || null
      });
    } catch(e) { console.error('Chain switch:', e); }
  }

  if(!S.demoMode && !skipLoad) {
    S.vaults = [];
    S.sel = 0;
    if(window._connectedAddress) showLoading('SWITCHING CHAIN');
    render();
    loadAllVaults();
  } else {
    render();
  }
}

// ── WALLET INTEGRATION ────────────────────────────────────────────

function onWalletConnect() {
  if(S.demoMode) {
    // Exit demo mode when wallet connects
    S.demoMode = false;
    S.vaults = [];
    S.sel = 0;
  }

  // Verify wallet is on the expected chain
  if(window._connectedWalletProvider) {
    (async () => {
      try {
        const wc = await window._connectedWalletProvider.request({method:'eth_chainId'});
        const walletChain = parseInt(wc, 16);
        if(walletChain !== S.chainId && CHAINS[walletChain]) {
          S.chainId = walletChain;
          localStorage.setItem('ms_chain', String(S.chainId));
          provider = makeProvider(S.chainId);
        }
      } catch(_) {}
      loadAllVaults();
    })();
  } else {
    loadAllVaults();
  }
  render();
}

function onWalletDisconnect() {
  S.vaults = [];
  S.sel = 0;
  render();
}

window.onWalletDisplayUpdate = render;

// ── DEEP LINKING ──────────────────────────────────────────────────

function handleDeepLink() {
  const hash = location.hash.slice(1);
  const matchTx = hash.match(/^(\d+)\/(0x[0-9a-fA-F]{40})\/tx\/(0x[0-9a-fA-F]{64})$/);
  const match = matchTx || hash.match(/^(\d+)\/(0x[0-9a-fA-F]{40})$/);
  if(match) {
    const linkChain = parseInt(match[1]);
    if(CHAINS[linkChain]) {
      S.chainId = linkChain;
      localStorage.setItem('ms_chain', String(S.chainId));
      provider = makeProvider(S.chainId);
      fetchBlock();
      // Load this specific vault
      const addr = match[2];
      (async () => {
        try {
          // Switch connected wallet to the deep-linked chain
          if(window._connectedWalletProvider) {
            try {
              await walletSwitchChain({
                chainId: linkChain,
                chainHex: CHAINS[linkChain].hex,
                rpc: CHAINS[linkChain].rpcs[0],
                addChainParams: ADD_CHAIN_PARAMS[linkChain] || null
              });
            } catch(_) {}
          }
          const vData = await loadSingleVaultData(addr);
          if(vData) {
            S.vaults = [vData];
            S.sel = 0;
            S.nt = vData.threshold;
            S.nd = vData.delay / 3600;
            render();
            await Promise.all([loadVaultQueue(0), loadVaultHistory(0)]);
            render();
          }
        } catch(e) {
          console.error('Deep link load:', e);
        }
      })();
      return true;
    }
  }
  return false;
}

// ── TICK (block number + ETA updates) ─────────────────────────────
async function fetchBlock(){
  try {
    const n = await provider.getBlockNumber();
    S.latestBlock = n;
    document.querySelectorAll("[data-block]").forEach(el=>el.textContent="BLOCK "+n.toLocaleString());
  } catch(_){}
}
setInterval(()=>{
  S.tick++;
  fetchBlock();
  document.querySelectorAll("[data-eta]").forEach(el=>{const eta=+el.dataset.eta;const f=fmtEta(eta);if(f)el.textContent=f==="READY"?"READY":new Date(eta*1000).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})});
},12000);

// ── INIT ──────────────────────────────────────────────────────────
(function init() {
  if(!CHAINS[S.chainId]) S.chainId = 1;
  provider = makeProvider(S.chainId);

  walletInit({
    appName: 'Multisig',
    chainId: S.chainId,
    chainHex: CHAINS[S.chainId].hex,
    rpc: CHAINS[S.chainId].rpcs[0],
    addChainParams: ADD_CHAIN_PARAMS[S.chainId] || null,
    onConnect: [onWalletConnect],
    onDisconnect: [onWalletDisconnect],
  });

  fetchBlock();

  handleDeepLink();
  render();
  setTimeout(hideLoading, 400);

  let resizeT;
  window.addEventListener("resize",()=>{clearTimeout(resizeT);resizeT=setTimeout(render,150)});
})();
</script>
