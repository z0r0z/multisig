<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>multisig</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%3Crect%20width%3D%2264%22%20height%3D%2264%22%20fill%3D%22%232D5FE8%22%2F%3E%0A%3Cdefs%3E%0A%3Cpath%20id%3D%22pt%22%20d%3D%22M4%2C4%20H60%22%20fill%3D%22none%22%2F%3E%0A%3Cpath%20id%3D%22pr%22%20d%3D%22M60%2C4%20V60%22%20fill%3D%22none%22%2F%3E%0A%3Cpath%20id%3D%22pb%22%20d%3D%22M60%2C60%20H4%22%20fill%3D%22none%22%2F%3E%0A%3Cpath%20id%3D%22pl%22%20d%3D%22M4%2C60%20V4%22%20fill%3D%22none%22%2F%3E%0A%3C%2Fdefs%3E%0A%3Ctext%20font-family%3D%22%27Courier%20New%27%2Cmonospace%22%20font-size%3D%224.2%22%20fill%3D%22%230A0A0A%22%20fill-opacity%3D%220.6%22%20letter-spacing%3D%22-0.3%22%3E%3CtextPath%20href%3D%22%23pt%22%3E%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%3C%2FtextPath%3E%3C%2Ftext%3E%0A%3Ctext%20font-family%3D%22%27Courier%20New%27%2Cmonospace%22%20font-size%3D%224.2%22%20fill%3D%22%230A0A0A%22%20fill-opacity%3D%220.6%22%20letter-spacing%3D%22-0.3%22%3E%3CtextPath%20href%3D%22%23pr%22%3E%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%3C%2FtextPath%3E%3C%2Ftext%3E%0A%3Ctext%20font-family%3D%22%27Courier%20New%27%2Cmonospace%22%20font-size%3D%224.2%22%20fill%3D%22%230A0A0A%22%20fill-opacity%3D%220.6%22%20letter-spacing%3D%22-0.3%22%3E%3CtextPath%20href%3D%22%23pb%22%3E%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%3C%2FtextPath%3E%3C%2Ftext%3E%0A%3Ctext%20font-family%3D%22%27Courier%20New%27%2Cmonospace%22%20font-size%3D%224.2%22%20fill%3D%22%230A0A0A%22%20fill-opacity%3D%220.6%22%20letter-spacing%3D%22-0.3%22%3E%3CtextPath%20href%3D%22%23pl%22%3E%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%2F%3C%2FtextPath%3E%3C%2Ftext%3E%0A%3Cpath%20d%3D%22M16%2C48%20V16%20H22%20L32%2C32%20L42%2C16%20H48%20V48%20H42%20V26%20L32%2C42%20L22%2C26%20V48%20Z%22%20fill%3D%22%230A0A0A%22%2F%3E%0A%3C%2Fsvg%3E" type="image/svg+xml">
<link rel="stylesheet" href="./wallet.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
:root{
  --a:#0A0A0A;--bg:#2D5FE8;--d:#0A0A0A99;--m:#0A0A0ACC;
  --ln:#0A0A0A1A;--fr:#0A0A0A38;--g:#7DFFBA;--gc:#000;--r:#FF6B6B;--y:#FFD600;
  --f:'IBM Plex Mono','Courier New',monospace;
}
.light{
  --a:#0099B3;--bg:#FDFDFD;--d:#007A8FAA;--m:#006A7DDD;
  --ln:#0099B31A;--fr:#0099B332;--g:#059669;--gc:#fff;--r:#DC2626;--y:#B45309;
}
body{font-family:var(--f);background:var(--bg);color:var(--a);min-height:100vh;padding:10px;position:relative;overflow-x:hidden;transition:background .3s,color .3s}
input,select,button,textarea{font-family:var(--f);font-size:16px;color:var(--a)}
input:focus,textarea:focus{border-bottom-color:var(--a)!important;outline:none}
button{cursor:pointer}
button:active{transform:scale(.97)}
::placeholder{color:var(--d)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--ln)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@media(hover:hover){
  button:hover{opacity:.85}
  .btn:hover{opacity:.9}
  .btn-fill:hover,.btn-green:hover{opacity:.85}
  .net-row:hover{color:var(--a);background:var(--ln)}
  .vtab:hover{color:var(--a)}
  .pill:hover{border-color:var(--a);color:var(--a)}
  .row:hover{background:var(--ln)}
  .inp:hover{border-bottom-color:var(--m)}
  .admin-tab:hover,.txb-tab:hover{color:var(--a)}
  .link-btn:hover{opacity:.7}
  .theme-btn:hover,.wallet-btn:hover{background:var(--ln)}
  .tx:not(.blocked):hover{background:var(--ln)}
}

/* scanline */
.scan{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(0deg,transparent,transparent 3px,#0A0A0A04 3px,#0A0A0A04 6px)}
.light .scan{background:repeating-linear-gradient(0deg,transparent,transparent 3px,#0099B302 3px,#0099B302 6px)}

/* frame */
.frame{position:relative;padding:0 24px;max-width:1060px;margin:0 auto}
.rail{position:absolute;top:0;bottom:0;width:12px;overflow:hidden;writing-mode:vertical-lr;font-size:11px;letter-spacing:1px;color:var(--fr);user-select:none;line-height:12px}
.rail-l{left:0}.rail-r{right:0}
.hbar{font-size:11px;letter-spacing:1px;color:var(--fr);user-select:none;overflow:hidden;white-space:nowrap;line-height:1}

/* header */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:22px 0 16px}
.logo{font-size:36px;font-weight:700;letter-spacing:-1px;line-height:1}
.sub{font-size:10px;letter-spacing:13px;color:var(--m);margin-top:2px;opacity:.5;user-select:none}
.info-i{font-size:10px;font-weight:400;width:20px;height:20px;border-radius:50%;border:1px solid var(--a);color:var(--a);display:inline-flex;align-items:center;justify-content:center;letter-spacing:0;opacity:.35;transition:opacity .2s;cursor:pointer;vertical-align:middle;margin-left:2px}
@media(hover:hover){.info-i:hover{opacity:.8}}
.info-tip{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(400px,88vw);padding:24px;background:var(--a);color:var(--bg);font-size:13px;line-height:1.9;letter-spacing:.3px;z-index:300;text-transform:none;font-weight:500}
.info-tip.open{display:block}
.info-tip .x{position:absolute;top:12px;right:12px;background:transparent;border:none;color:var(--bg);font-size:14px;cursor:pointer;opacity:.6;padding:4px 8px}
.info-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299}
.info-backdrop.open{display:block}
.addr{font-size:10px;letter-spacing:2px;color:var(--m);margin-top:4px}
.hdr-r{display:flex;gap:10px;align-items:center}
.theme-btn{background:transparent;border:1px solid var(--ln);color:var(--a);width:40px;height:40px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.wallet-btn{background:transparent;border:1px solid var(--ln);color:var(--m);height:40px;padding:0 14px;font-size:10px;font-weight:600;letter-spacing:1px;display:flex;align-items:center;gap:6px;transition:background .15s}
.dot-sm{width:4px;height:4px;border-radius:50%;background:var(--g)}

/* nav */
.nav{display:flex;border-bottom:1px solid var(--ln)}
.nav button{padding:14px 20px;font-size:12px;font-weight:700;letter-spacing:2px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--d);transition:color .15s,border-color .15s}
.nav button.on{color:var(--a);border-bottom-color:var(--a)}

/* content */
.content{padding:8px 0;min-height:60vh}

/* section divider */
.sec{display:flex;align-items:center;gap:10px;margin:40px 0 16px;user-select:none}
.sec span:first-child{font-size:10px;letter-spacing:3px;color:var(--d);flex-shrink:0}
.sec .line{flex:1;height:1px;background:var(--ln)}

/* buttons */
.btn{font-size:11px;font-weight:700;letter-spacing:2px;height:40px;display:inline-flex;align-items:center;justify-content:center;padding:0 20px;text-transform:uppercase;border:none;transition:opacity .15s,background .15s}
.btn-fill{background:var(--a);color:var(--bg)}
.btn-green{background:var(--g);color:var(--gc)}
.btn-outline{background:transparent;color:var(--a);border:1px solid var(--a)}
.btn-danger{background:transparent;color:var(--r);border:1px solid color-mix(in srgb,var(--r) 35%,transparent)}
.btn-w{width:100%}
.btn-sm{height:30px;padding:0 14px;font-size:10px}
.btn-big{height:48px;font-size:13px;letter-spacing:3px}

/* inputs */
.inp{width:100%;padding:12px 0;font-size:15px;background:transparent;border:none;border-bottom:1px solid var(--ln);margin-bottom:16px;border-radius:0;-webkit-appearance:none;transition:border-color .15s}
.lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--m);margin-bottom:4px;display:block}
.lbl .dim{opacity:.5}
textarea.inp{min-height:80px;resize:vertical;border:1px solid var(--ln);padding:12px;font-size:13px;border-bottom:1px solid var(--ln)}

/* row */
.row{display:flex;justify-content:space-between;align-items:center;padding:16px 8px;border-bottom:1px solid var(--ln);flex-wrap:wrap;gap:10px;transition:background .15s}
.sep{height:1px;background:var(--ln);margin:32px 0}

/* vault tabs */
.vtabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.vtabs::-webkit-scrollbar{display:none}
.vtabs-inner{display:flex;border-bottom:1px solid var(--ln);min-width:max-content}
.vtab{padding:16px 24px;text-align:left;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--d);position:relative;flex:1 0 140px;transition:color .15s}
.vtab.on{color:var(--a);border-bottom-color:var(--a)}
.vtab-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.vtab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
.vtab-info{font-size:10px;opacity:.7;margin-top:3px}

/* stats */
.stats{padding:36px 0 8px}
.stat-big{font-size:52px;font-weight:700;letter-spacing:-2px;line-height:1}
.stat-token{font-size:16px;font-weight:600;color:var(--m)}
.stat-usd{font-size:13px;color:var(--d)}
.holdings{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;font-size:12px;color:var(--m)}
.holdings strong{font-weight:700}
.holdings .usd{font-size:10px;color:var(--d);margin-left:4px}
.meta{display:flex;gap:24px;font-size:11px;letter-spacing:2px;color:var(--m);margin-top:12px;flex-wrap:wrap}

/* queue */
.tx{padding:22px 8px;border-bottom:1px solid var(--ln);transition:opacity .3s,background .15s}
.tx.blocked{opacity:.3}
.tx-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.tx-nonce{font-size:10px;font-weight:700;color:var(--d)}
.tx-val{font-size:20px;font-weight:700}
.tx-to{font-size:11px;color:var(--m);margin-top:3px;word-break:break-all}
.tx-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tx-status{font-size:10px;font-weight:700;letter-spacing:2px}
.approvals{display:flex;gap:12px;flex-wrap:wrap;align-items:center;font-size:10px;letter-spacing:1px}
.ap-ok{color:var(--g);font-weight:600}
.ap-no{color:var(--d);font-weight:600}
.eta{color:var(--d);margin-left:auto;font-size:10px}
.mob-actions{margin-top:14px}

/* tx builder */
.txb{padding:24px 8px;border-bottom:1px solid var(--ln)}
.txb-tabs{display:flex;gap:20px;margin-bottom:24px;align-items:center}
.txb-tab{background:transparent;border:none;font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 0;color:var(--d);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.txb-tab.on{color:var(--a);border-bottom-color:var(--a)}
.x-btn{background:transparent;border:none;color:var(--d);font-size:14px;padding:8px;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center;margin-left:auto}
.x-btn.red{color:var(--r)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.grid3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:16px}
.token-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{height:34px;padding:0 14px;font-size:10px;font-weight:700;letter-spacing:2px;display:inline-flex;align-items:center;background:transparent;color:var(--d);border:1px solid var(--ln);text-transform:uppercase;transition:border-color .15s,color .15s}
.pill.on{color:var(--a);border-color:var(--a);background:color-mix(in srgb,var(--a) 10%,transparent)}
.link-btn{background:transparent;border:none;color:var(--a);font-size:11px;font-weight:700;letter-spacing:2px;padding:8px 0;display:flex;align-items:center}
.batch-call{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--ln)}
.call-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:10px;font-weight:700;color:var(--d);letter-spacing:2px}

/* signers */
.signer-addr{font-size:14px;font-weight:700;word-break:break-all}
.signer-label{font-size:10px;color:var(--m);letter-spacing:2px;margin-top:2px}
.signer-you{font-size:9px;font-weight:700;color:var(--a);letter-spacing:2px}

/* footer */
.footer{border-top:1px solid var(--ln);padding:12px 0;display:flex;justify-content:space-between;align-items:center;font-size:9px;letter-spacing:2px;color:var(--m);flex-wrap:wrap;gap:8px}
.footer-l,.footer-r{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.reset-btn{background:transparent;border:none;color:var(--d);font-size:9px;letter-spacing:2px;padding:4px 0}
.docs-link{color:var(--d);font-size:9px;letter-spacing:2px;text-decoration:none}
.docs-link:hover{color:var(--a)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--a);color:var(--bg);padding:12px 24px;font-size:11px;font-weight:700;letter-spacing:2px;z-index:999;animation:toastIn .2s ease;text-align:center}

/* empty */
.empty{text-align:center;padding:120px 0}
.empty-title{font-size:44px;font-weight:700;letter-spacing:-2px}
.empty-sub{font-size:12px;color:var(--m);letter-spacing:2px;margin:12px 0 32px}

/* network selector */
.net-row{padding:12px 8px;font-size:12px;font-weight:700;letter-spacing:2px;border-bottom:1px solid var(--ln);color:var(--d);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
.net-row.on{color:var(--a);border-bottom:none}
.net-id{font-size:9px;opacity:.4}
.net-test{font-size:8px;opacity:.5}
.net-tokens{padding:8px 0 12px 16px;border-bottom:1px solid var(--ln);font-size:10px;color:var(--d);display:flex;gap:10px;flex-wrap:wrap}
.net-tokens span{font-weight:600}

/* admin */
.admin-note{font-size:10px;color:var(--d);letter-spacing:2px;margin:12px 0 20px}
.admin-tabs{display:flex;gap:24px;margin-bottom:32px}
.admin-tab{background:transparent;border:none;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--d);padding:4px 0;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.admin-tab.on{color:var(--a);border-bottom-color:var(--a)}
.policy-big{font-size:44px;font-weight:700;letter-spacing:-2px}
.policy-of{font-size:18px;font-weight:700;color:var(--m)}
.changed-tag{font-size:10px;color:var(--y);letter-spacing:2px}
.thresh-btns{display:flex;gap:6px;margin-bottom:16px}
.thresh-btn{flex:1;padding:0 4px}
.preview-text{font-size:12px;line-height:2;color:var(--m);padding:16px 0;white-space:pre}

/* mobile */
@media(max-width:900px){
  .frame{max-width:100%}
  .grid2{gap:24px}
  .policy-big{font-size:38px}
}
@media(max-width:640px){
  body{padding:6px}
  .frame{padding:0 6px}
  .rail{display:none}
  .hbar{font-size:10px}
  .logo{font-size:24px}
  .sub{font-size:8px;letter-spacing:7.5px}
  .info-i{width:16px;height:16px;font-size:8px}
  .info-tip{width:min(340px,90vw);font-size:12px;padding:20px}
  .hdr{padding:18px 0 12px}
  .hdr-r{gap:8px}
  .wallet-btn{padding:0 10px;font-size:9px;gap:4px}
  .nav button{padding:14px 0;flex:1;text-align:center;font-size:11px}
  .content{padding:4px 0}
  .sec{margin:28px 0 12px}
  .stats{padding:24px 0 8px}
  .stat-big{font-size:32px}
  .stat-token{font-size:13px}
  .stat-usd{font-size:11px}
  .holdings{gap:14px}
  .meta{gap:10px;font-size:10px}
  .vtab{padding:14px 16px;flex:0 0 auto;min-width:120px}
  .vtab-name{font-size:12px}
  .tx{padding:18px 6px}
  .tx-val{font-size:16px}
  .tx-to{font-size:10px}
  .row{padding:14px 6px}
  .sep{margin:24px 0}
  .grid2,.grid3{grid-template-columns:1fr;gap:0}
  .txb-tabs{gap:12px}
  .txb{padding:20px 6px}
  .token-pills{margin-bottom:12px}
  .pill{height:38px;padding:0 12px}
  .approvals{gap:6px}
  .btn{height:44px;padding:0 16px}
  .btn-sm{height:38px;padding:0 12px}
  .btn-big{height:52px}
  .thresh-btns{gap:4px}
  .thresh-btn{min-height:44px}
  .toast{bottom:20px;max-width:88vw}
  .footer{font-size:8px;letter-spacing:1px}
  .footer-l,.footer-r{gap:8px}
  .empty{padding:60px 0}
  .empty-title{font-size:28px}
  .admin-tabs{gap:14px;margin-bottom:24px}
  .admin-tab{font-size:11px}
  .policy-big{font-size:32px}
  .link-btn{padding:12px 0;min-height:44px}
  .x-btn{min-width:44px;min-height:44px}
  .net-row{padding:14px 8px;min-height:44px}
  .addr{font-size:9px;letter-spacing:1px}
}
@media(max-width:380px){
  .logo{font-size:20px}
  .wallet-btn{padding:0 8px;font-size:8px;height:36px}
  .theme-btn{width:36px;height:36px;font-size:12px}
  .stat-big{font-size:26px}
  .vtab{min-width:100px;padding:12px 12px}
  .vtab-name{font-size:11px}
  .empty-title{font-size:24px}
  .nav button{font-size:10px;padding:12px 0}
}
/* loading overlay */
.loading-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .3s}
.loading-overlay.dark-bg{background:#2D5FE8}
.loading-overlay.light-bg{background:#FDFDFD}
.loading-overlay .loading-svg{width:80px;height:80px}
.loading-overlay .loading-text{font-family:var(--f,'IBM Plex Mono',monospace);font-size:9px;font-weight:700;letter-spacing:4px;animation:pulse 2s infinite}
.loading-overlay.dark-bg .loading-text{color:#0A0A0A99}
.loading-overlay.light-bg .loading-text{color:#0099B3AA}
.loading-overlay.fade-out{opacity:0;pointer-events:none}
@media(max-width:640px){.loading-overlay .loading-svg{width:56px;height:56px}.loading-overlay .loading-text{font-size:8px;letter-spacing:3px}}
</style>
</head>
<body>
<div class="scan"></div>
<div id="loading" class="loading-overlay"></div>
<script>
(function(){
  var d=!localStorage.getItem('ms_light');
  var el=document.getElementById('loading');

function makeProvider(id) {
  if(_providerCache[id]) return _providerCache[id];
  const c = CHAINS[id];
  const p = c.rpcs.length === 1
    ? new ethers.JsonRpcProvider(c.rpcs[0], id, {staticNetwork:true})

  _providerCache[id] = p;
  return p;
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
const DECIMALS = {ETH:18,USDC:6,USDT:6,DAI:18,WBTC:8,wstETH:18,cbBTC:8};
function toUnits(val,dec){if(!val||val==="0")return"0";const s=val.replace(/,/g,"");if(!/^\d+(\.\d+)?$/.test(s))return"INVALID";const p=s.split(".");const w=p[0]||"0";const f=(p[1]||"").padEnd(dec,"0").slice(0,dec);return(w+f).replace(/^0+/,"")||"0"}

function fmtEta(eta){if(!eta)return null;const d=eta-NOW();if(d<=0)return"READY";const h=Math.floor(d/3600),m=Math.floor((d%3600)/60);return h>0?`${h}H ${m}M`:`${m}M`}
function fmtD(s){if(!s)return"0";const h=s/3600;return h>=24?`${Math.floor(h/24)}D`:`${h}H`}

function nextNonce(v){return v.queue.length?Math.max(v.nonce,...v.queue.map(t=>t.nonce+1)):v.nonce}
function txSt(tx,v){
  const you = getYou();
  const ac=Object.values(tx.approvals).filter(Boolean).length;
  if(tx.eta>0){if(fmtEta(tx.eta)==="READY")return{l:"READY",c:"var(--g)",exec:true,cancel:true};return{l:fmtEta(tx.eta),c:"var(--d)",cancel:true,accel:v.fastPath}}

  if(v.delay===0)return{l:"EXECUTE",c:"var(--g)",queue:true,instant:true};
  return{l:"SUBMIT",c:"var(--a)",queue:true};
}

        <button class="reset-btn" style="display:flex;align-items:center;gap:5px" onclick="S.showChains=!S.showChains;render()"><span class="dot-sm"></span>${esc(chainName())}</button>
        <span style="color:var(--ln)">&middot;</span>

      </div>
      <div class="footer-r">
        <a href="docs.html" class="docs-link">DOCS</a>
        ${S.vaults.length===0&&!S.demoMode?`<button class="reset-btn" onclick="S.demoMode=true;S.vaults=seed();S.sel=0;flash('DEMO LOADED');render()">DEMO</button>`:""}
        ${S.demoMode?`<button class="reset-btn" onclick="S.demoMode=false;S.vaults=[];S.sel=0;S.view='DASH';S.showTx=false;S.batch=[{t:'',v:'',d:''},{t:'',v:'',d:''}];S.adminTab='POLICY';flash('DEMO CLEARED');render()">RESET</button>`:""}
        ${!S.demoMode&&S.vaults.length>0?`<button class="reset-btn" onclick="loadAllVaults()">RELOAD</button>`:""}

function renderChainOverlay(mob){

  const testnets = NETS.filter(n=>n.test);

  <div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(400px,90vw);max-height:80vh;overflow-y:auto;background:var(--bg);border:1px solid var(--a);padding:20px;z-index:201">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:12px;font-weight:700;letter-spacing:2px">SELECT CHAIN</span>
      <button class="x-btn" onclick="S.showChains=false;render()" style="margin:0">&#10005;</button>
    </div>
    <div style="font-size:9px;letter-spacing:2px;color:var(--d);margin-bottom:8px">MAINNETS</div>
    ${mainnets.map(n=>{

      return`<div class="net-row${on?" on":""}" onclick="switchChain(${n.id})">

        <span class="net-id">${n.id}</span>
      </div>`}).join("")}
    <div style="font-size:9px;letter-spacing:2px;color:var(--d);margin:12px 0 8px">TESTNETS</div>
    ${testnets.map(n=>{
      const on = (!S.demoMode && n.id===S.chainId);
      return`<div class="net-row${on?" on":""}" onclick="switchChain(${n.id})">

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDash(v,mob){
  if(!v)return`<div class="empty"><div class="empty-title">NO VAULTS</div><div class="empty-sub">${S.demoMode?"":"DEPLOY YOUR FIRST MULTISIG"}</div><button class="btn btn-outline" style="padding:0 32px;height:48px" onclick="S.view='CREATE';render()">CREATE VAULT</button>${!S.demoMode?`<div style="margin-top:32px;display:flex;align-items:center;gap:8px;justify-content:center"><input class="inp" id="load-addr" style="max-width:320px;margin:0;font-size:12px" placeholder="0x... LOAD EXISTING VAULT"><button class="btn btn-outline btn-sm" onclick="loadVaultByAddress()">LOAD</button></div><div style="margin-top:32px"><button class="btn btn-outline" style="font-size:9px;border-color:var(--ln);color:var(--d)" onclick="S.demoMode=true;S.vaults=seed();S.sel=0;flash('DEMO LOADED');render()">LOAD DEMO</button></div>`:""}</div>`;
  const you = getYou();
  const h0=v.holdings[0];

  let needsSig=0,readyExec=0,pendingSubmit=0;
  S.vaults.forEach((vt,vi)=>{
    vt.queue.forEach(tx=>{
      const st=txSt(tx,vt);
      if(st.sign&&you&&!tx.approvals[you])needsSig++;
      if(st.exec||st.instant)readyExec++;
      else if(st.queue)pendingSubmit++;
    });
  });
  const totalActions=needsSig+readyExec+pendingSubmit;
  const attnParts=[];
  if(needsSig)attnParts.push(`${needsSig} NEED${needsSig>1?"":"S"} YOUR SIG`);
  if(readyExec)attnParts.push(`${readyExec} READY TO EXECUTE`);
  if(pendingSubmit)attnParts.push(`${pendingSubmit} READY TO SUBMIT`);

  return`
  ${totalActions>0?`<div style="padding:${mob?"12px 6px":"14px 8px"};margin-bottom:4px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:${mob?8:12}px;flex-wrap:wrap;font-size:10px;letter-spacing:2px">
    <span style="color:var(--y);font-weight:700">${totalActions} ACTION${totalActions>1?"S":""}</span>
    <span style="color:var(--d)">${attnParts.join(" &middot; ")}</span>
  </div>`:""}
  <div class="vtabs"><div class="vtabs-inner">
    ${S.vaults.map((vt,i)=>{
      const on=i===S.sel;
      const rdy=vt.queue.some(tx=>{const st=txSt(tx,vt);return st.exec||st.instant});
      const needsYou=vt.queue.some(tx=>{const st=txSt(tx,vt);return st.sign&&you&&!tx.approvals[you]});
      const dot=rdy?'<span class="vtab-dot" style="background:var(--g)"></span>':needsYou?'<span class="vtab-dot" style="background:var(--y)"></span>':"";
      return`<button class="vtab${on?" on":""}" onclick="S.sel=${i};S.showTx=false;render()">
      <div class="vtab-name">${esc(vt.name)}${dot}</div>
      <div class="vtab-info">${vt.holdings.length?vt.holdings[0].balance+" "+vt.holdings[0].token+(vt.holdings.length>1?" +"+(vt.holdings.length-1)+" MORE":""):"EMPTY"}${vt.queue.length>0?` &middot; ${vt.queue.length} PENDING`:""}</div>
    </button>`}).join("")}
  </div></div>
  <div class="stats">
    ${h0?`<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
      <span class="stat-big">${h0.balance}</span>
      <span class="stat-token">${h0.token}</span>
      <span class="stat-usd">${h0.usd}</span>
    </div>
    ${v.holdings.length>1?`<div class="holdings">${v.holdings.slice(1).map(h=>`<span>${h.balance} <strong>${h.token}</strong><span class="usd">${h.usd}</span></span>`).join("")}</div>`:""}`
    :`<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
      <span class="stat-big" style="color:var(--d)">0</span>
      <span class="stat-token">ETH</span>
    </div>
    <div style="font-size:11px;color:var(--d);letter-spacing:2px;margin-top:8px">NO BALANCES</div>`}
    <div class="meta">
      <span>${v.threshold}/${v.ownerCount} SIG</span>
      ${v.delay>0
        ?`<span style="border-left:2px solid var(--a);padding-left:10px;margin-left:2px"><strong>${v.delay/3600}h</strong> TIMELOCK</span>`
        :`<span style="border-left:2px solid var(--y);padding-left:10px;margin-left:2px;color:var(--y)"><strong>UNLOCKED</strong></span>`}
      <span>${S.demoMode?v.chain:chainName()}</span>
      ${v.executor===ethers.ZeroAddress||v.executor==="0x0000...0000"?'<span style="color:var(--y)">NO EXECUTOR</span>':""}
      ${v.fastPath?'<span style="color:var(--g)">FAST PATH</span>':""}
    </div>
  </div>
  <div class="sec"><span>QUEUE</span><span class="line"></span>
    ${S.showTx?"":`<button class="btn btn-outline btn-sm" onclick="S.showTx=true;S.txMode='TRANSFER';S.txToken='ETH';render()">+ NEW</button>`}
  </div>
  ${S.showTx?renderTxBuilder(v,mob):""}
  ${v.queue.length===0&&!S.showTx?`<div style="padding:48px 0;text-align:center;font-size:13px;color:var(--d);letter-spacing:2px">NO PENDING TRANSACTIONS</div>`:v.queue.map((tx,i)=>{
    const s=txSt(tx,v),isCancel=isCancelTx(tx,v);
    const isQueued=tx.eta>0;
    const firstUnqueued=v.queue.findIndex(t=>t.eta===0&&!isCancelTx(t,v));
    const blocked=!isQueued&&!isCancel&&i!==firstUnqueued;
    const display=tx.value&&tx.value!=="0"?`${tx.value} ${tx.token}`:tx.dataLabel;
    const apHtml=v.owners.map(o=>`<span class="${tx.approvals[o.addr]?"ap-ok":"ap-no"}">${tx.approvals[o.addr]?"\u2713":"\u25CB"} ${esc(o.label)}${o.you?"*":""}</span>`).join("");
    const etaHtml=tx.eta>0&&fmtEta(tx.eta)!=="READY"?`<span class="eta" data-eta="${tx.eta}">${new Date(tx.eta*1000).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>`:"";
    const signedByYou=you&&tx.approvals[you];
    let actionBtn="";
    if(s.sign&&!signedByYou){
      actionBtn=mob
        ?`<div style="display:flex;gap:8px;flex-direction:column">
            <button class="btn btn-fill btn-w" onclick="doSign(${S.sel},${tx.nonce})">SIGN <span style="opacity:.5;font-size:9px;margin-left:4px">OFF-CHAIN</span></button>
            <button class="btn btn-outline btn-w" onclick="doApprove(${S.sel},${tx.nonce})">APPROVE <span style="opacity:.5;font-size:9px;margin-left:4px">ON-CHAIN</span></button>
          </div>`
        :`<div style="display:flex;gap:8px">
            <button class="btn btn-fill" onclick="doSign(${S.sel},${tx.nonce})">SIGN</button>
            <button class="btn btn-outline" onclick="doApprove(${S.sel},${tx.nonce})">APPROVE</button>
          </div>`;
    }else if(s.sign&&signedByYou){
      actionBtn=`<button class="btn btn-outline" ${mob?"style='width:100%'":""} onclick="doUnsign(${S.sel},${tx.nonce})">UNSIGN</button>`;
    }else if(s.queue){
      const ac=Object.values(tx.approvals).filter(Boolean).length;
      const unanimous=ac===v.ownerCount;
      if(s.instant){
        actionBtn=`<button class="btn btn-green" ${mob?"style='width:100%'":""} onclick="doSubmit(${S.sel},${tx.nonce})">EXECUTE</button>`;
      }else if(isCancel){
        actionBtn=`<button class="btn btn-danger" ${mob?"style='width:100%'":""} onclick="doSubmit(${S.sel},${tx.nonce})">EXECUTE CANCEL</button>`;
      }else if(unanimous&&v.fastPath){
        actionBtn=mob
          ?`<div style="display:flex;gap:8px;flex-direction:column">
              <button class="btn btn-green btn-w" onclick="doFastExecute(${S.sel},${tx.nonce})">INSTANT EXECUTE <span style="opacity:.5;font-size:9px;margin-left:4px">VIA EXECUTOR</span></button>
              <button class="btn btn-outline btn-w" onclick="doSubmit(${S.sel},${tx.nonce})">QUEUE WITH TIMELOCK</button>
            </div>`
          :`<div style="display:flex;gap:8px">
              <button class="btn btn-green" onclick="doFastExecute(${S.sel},${tx.nonce})">INSTANT EXECUTE</button>
              <button class="btn btn-outline" onclick="doSubmit(${S.sel},${tx.nonce})">QUEUE</button>
            </div>`;
      }else{
        actionBtn=`<button class="btn btn-fill" ${mob?"style='width:100%'":""} onclick="doSubmit(${S.sel},${tx.nonce})">SUBMIT</button>`;
      }
    }else if(s.exec){
      actionBtn=mob
        ?`<div style="display:flex;gap:8px;flex-direction:column">
            <button class="btn btn-green btn-w" onclick="doExecute(${S.sel},${tx.nonce})">EXECUTE</button>
            <button class="btn btn-danger btn-w" onclick="doCancel(${S.sel},${tx.nonce})">CANCEL</button>
          </div>`
        :`<div style="display:flex;gap:8px">
            <button class="btn btn-green" onclick="doExecute(${S.sel},${tx.nonce})">EXECUTE</button>
            <button class="btn btn-danger" onclick="doCancel(${S.sel},${tx.nonce})">CANCEL</button>
          </div>`;
    }else if(s.cancel){
      actionBtn=mob
        ?`<div style="display:flex;gap:8px;flex-direction:column">
            ${s.accel?`<button class="btn btn-outline btn-w" onclick="doAccelerate(${S.sel},${tx.nonce})">ACCELERATE</button>`:''}
            <button class="btn btn-danger btn-w" onclick="doCancel(${S.sel},${tx.nonce})">CANCEL</button>
          </div>`
        :`<div style="display:flex;gap:8px">
            ${s.accel?`<button class="btn btn-outline" onclick="doAccelerate(${S.sel},${tx.nonce})">ACCELERATE</button>`:''}
            <button class="btn btn-danger" onclick="doCancel(${S.sel},${tx.nonce})">CANCEL</button>
          </div>`;
    }
    return`<div class="tx${blocked?" blocked":""}">
      <div class="tx-top">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
            <span class="tx-nonce">#${tx.nonce}${isCancel?" VIA EXECUTOR":i===firstUnqueued&&!isQueued?" NEXT":""}</span>
            <span class="tx-val">${esc(display)}</span>
          </div>
          <div class="tx-to">&rarr; ${S.demoMode?addrLink(tx.target,v.chain):addrLink(tx.target)}</div>
        </div>
        ${!mob&&!blocked?`<div class="tx-actions"><span class="tx-status" style="color:${s.c}">&bull; ${s.l}</span>${actionBtn}</div>`:""}
        ${mob&&!blocked?`<span class="tx-status" style="color:${s.c}">&bull; ${s.l}</span>`:""}
        ${blocked?'<span style="font-size:10px;color:var(--d);letter-spacing:2px">BLOCKED</span>':""}
      </div>
      <div class="approvals">${apHtml}${etaHtml}</div>
      ${mob&&!blocked&&actionBtn?`<div class="mob-actions">${actionBtn}</div>`:""}
    </div>`}).join("")}
  <div class="sec"><span>SIGNERS</span><span class="line"></span></div>
  ${v.owners.map(o=>`<div class="row">
    <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;min-width:0">
      <span class="signer-addr">${S.demoMode?addrLink(o.addr,v.chain):addrLink(o.addr)}</span><span class="signer-label">${esc(o.label)}</span>
    </div>
    ${o.you?'<span class="signer-you">YOU</span>':""}
  </div>`).join("")}`;
}

// ── TX BUILDER ────────────────────────────────────────────────────
function renderTxBuilder(v,mob){
  const tokens = S.demoMode ? (DEMO_TOKENS[v.chain]||["ETH"]) : getProdTokenSymbols();
  const tabs=["TRANSFER","CUSTOM","BATCH"].map(m=>`<button class="txb-tab${S.txMode===m?" on":""}" onclick="S.txMode='${m}';render()">${m}</button>`).join("");
  let body="";
  if(S.txMode==="TRANSFER"){
    const dec=DECIMALS[S.txToken]||18;
    const unitLabel=S.txToken==="ETH"?"WEI":"UNITS ("+dec+" DECIMALS)";
    body=`<div class="grid2">
      <div>
        <label class="lbl">TOKEN</label>
        <div class="token-pills">${tokens.map(t=>`<button class="pill${S.txToken===t?" on":""}" onclick="S.txToken='${t}';render()">${t}</button>`).join("")}</div>
        <label class="lbl">AMOUNT</label><input class="inp" id="tx-amount" placeholder="0.0" oninput="document.getElementById('tx-units').textContent=this.value?toUnits(this.value,${dec})+' ${unitLabel}':''">
        <div id="tx-units" style="font-size:10px;color:var(--d);margin-top:-12px;margin-bottom:12px;word-break:break-all"></div>
      </div><div>
        <label class="lbl">RECIPIENT</label><input class="inp" id="tx-to" placeholder="0x... or name.eth / name.wei">
        ${S.txToken!=="ETH"?`<div style="font-size:10px;color:var(--d);margin-top:-12px;margin-bottom:12px">ON-CHAIN: transfer(recipient, amount) on ${S.txToken} contract</div>`:""}
        <button class="btn btn-fill btn-w" style="margin-top:${mob?8:16}px" onclick="submitTransfer()">SIGN + SUBMIT</button>
      </div></div>`;
  }else if(S.txMode==="CUSTOM"){
    body=`<div class="grid2">
      <div>
        <label class="lbl">TARGET</label><input class="inp" id="cx-target" placeholder="0x...">
        <label class="lbl">VALUE (ETH)</label><input class="inp" id="cx-value" placeholder="0" oninput="document.getElementById('cx-wei').textContent=this.value?toUnits(this.value,18)+' WEI':''">
        <div id="cx-wei" style="font-size:10px;color:var(--d);margin-top:-12px;margin-bottom:12px;word-break:break-all"></div>
      </div><div>
        <label class="lbl">CALLDATA</label><textarea class="inp" id="cx-data" placeholder="0x..."></textarea>
        <button class="btn btn-fill btn-w" style="margin-top:${mob?8:16}px" onclick="submitCustom()">SIGN + SUBMIT</button>
      </div></div>`;
  }else{
    body=S.batch.map((c,i)=>`<div class="batch-call">
      <div class="call-hdr"><span>CALL ${String(i+1).padStart(2,"0")}</span>${S.batch.length>1?`<button class="x-btn" onclick="S.batch.splice(${i},1);render()">&#10005;</button>`:""}</div>
      <div class="grid3">
        <div><label class="lbl">TARGET</label><input class="inp" data-bi="${i}" data-bf="t" placeholder="0x..." value="${esc(c.t)}" oninput="S.batch[${i}].t=this.value"></div>
        <div><label class="lbl">VALUE (ETH)</label><input class="inp" data-bi="${i}" data-bf="v" placeholder="0" value="${esc(c.v)}" oninput="S.batch[${i}].v=this.value;this.nextElementSibling.textContent=this.value?toUnits(this.value,18)+' WEI':''"><div style="font-size:10px;color:var(--d);margin-top:-12px;margin-bottom:8px;word-break:break-all"></div></div>
        <div><label class="lbl">CALLDATA</label><input class="inp" data-bi="${i}" data-bf="d" placeholder="0x..." value="${esc(c.d)}" oninput="S.batch[${i}].d=this.value"></div>
      </div></div>`).join("")+
      `<button class="link-btn" onclick="S.batch.push({t:'',v:'',d:''});render()">+ ADD CALL</button>
       <button class="btn btn-fill btn-w" style="margin-top:16px" onclick="submitBatch()">SIGN + SUBMIT BATCH</button>`;
  }
  return`<div class="txb"><div class="txb-tabs">${tabs}<button class="x-btn" onclick="S.showTx=false;render()">&#10005;</button></div>${body}</div>`;
}

function getProdTokenSymbols(){
  const toks = PROD_TOKENS[S.chainId] || ETH_ONLY;
  return toks.map(t=>t.symbol);
}

// ── CREATE ────────────────────────────────────────────────────────
function renderCreate(mob){
  const c=S.cf,ds=(parseInt(c.delayH)||0)*3600,net=NETS[c.net],toks=DEMO_TOKENS[net.name]||["ETH"];
  const explorerBase = S.demoMode ? (EXPLORERS[net.name]||EXPLORERS.ETHEREUM) : (CHAINS[S.chainId]?CHAINS[S.chainId].explorer:'https://etherscan.io');
  return`
  <div class="sec"><span>DEPLOY NEW VAULT</span><span class="line"></span></div>
  <div class="grid2" style="gap:${mob?0:48}px">
    <div>
      <label class="lbl">VAULT NAME</label>
      <input class="inp" style="margin-bottom:20px" placeholder="MY VAULT" value="${esc(c.name||'')}" oninput="S.cf.name=this.value">
      <label class="lbl">OWNERS</label>
      ${c.owners.map((o,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:2px">
        <span style="font-size:10px;font-weight:700;color:var(--d);width:20px">${String(i+1).padStart(2,"0")}</span>
        <input class="inp" style="margin-bottom:8px;flex:2" placeholder="0x... or name.eth / name.wei" value="${esc(o.addr)}" oninput="S.cf.owners[${i}].addr=this.value;const fc=S.cf.owners.filter(o=>o.addr.trim()).length||1;if(+S.cf.threshold>fc)S.cf.threshold=String(fc);render()">
        <input class="inp" style="margin-bottom:8px;flex:1;font-size:11px;letter-spacing:1px" placeholder="LABEL" value="${esc(o.label)}" oninput="S.cf.owners[${i}].label=this.value">
        ${c.owners.length>1?`<button class="x-btn red" onclick="S.cf.owners.splice(${i},1);S.cf.threshold=String(Math.min(+S.cf.threshold||1,S.cf.owners.length));render()">&#10005;</button>`:""}
      </div>`).join("")}
      <button class="link-btn" onclick="S.cf.owners.push({addr:'',label:''});S.cf.threshold=String(Math.min(+S.cf.threshold||1,S.cf.owners.length));render()">+ ADD</button>
      <div class="sep"></div>
      <div class="grid2" style="gap:24px">
        <div>
          <label class="lbl">THRESHOLD</label>
          <select class="inp" style="cursor:pointer;appearance:none" onchange="S.cf.threshold=this.value;render()">
            ${(()=>{const filled=c.owners.filter(o=>o.addr.trim()).length||1;return Array.from({length:filled},(_,i)=>`<option value="${i+1}"${+c.threshold===i+1?" selected":""}>${i+1} of ${filled}</option>`).join("")})()}
          </select>
        </div>
        <div>

// ── PRODUCTION: NAME RESOLUTION ───────────────────────────────────
const ethMainRpc = makeProvider(1);

async function resolveName(input) {
  const v = input.trim();
  if(!v) throw new Error('Empty input');
  if(ethers.isAddress(v)) return ethers.getAddress(v);
  if(v.endsWith('.wei')) {
    const ns = new ethers.Contract(WEINS, WEINS_ABI, ethMainRpc);
    const tokenId = await ns.computeId(v);
    const owner = await ns.ownerOf(tokenId);
    if(!owner || owner === ethers.ZeroAddress) throw new Error(`${v} not found`);
    return ethers.getAddress(owner);
  }
  if(v.endsWith('.eth')) {
    const addr = await ethMainRpc.resolveName(v);
    if(!addr) throw new Error(`${v} not found`);
    return ethers.getAddress(addr);
  }
  throw new Error('Enter an address, .eth, or .wei name');
}

// ── PRODUCTION: MULTICALL ─────────────────────────────────────────

async function multicallLoad(addr) {
  const mc = new ethers.Contract(MC3, MC3_ABI, provider);
  const encode = fn => ({ target: addr, allowFailure: false, callData: msIface.encodeFunctionData(fn) });
  const fns = ['threshold','delay','nonce','executor','ownerCount','getOwners'];
  const [results, balance] = await Promise.all([mc.aggregate3(fns.map(encode)), provider.getBalance(addr)]);
  const d = (fn, i) => msIface.decodeFunctionResult(fn, results[i].returnData)[0];
  return { threshold:d('threshold',0), delay:d('delay',1), nonce:d('nonce',2), executor:d('executor',3), ownerCount:d('ownerCount',4), owners:d('getOwners',5), balance };
}

async function loadTokenBalances(walletAddr, ethBalance) {
  const allTokens = PROD_TOKENS[S.chainId] || ETH_ONLY;
  const erc20Tokens = allTokens.filter(t => t.address !== ethers.ZeroAddress);

  const feeds = CHAINLINK_FEEDS[S.chainId] || {};
  const feedSymbols = Object.keys(feeds);
  const latestAnswerData = clIface.encodeFunctionData('latestAnswer');
  let balances, prices = {};

  try {
    const mc = new ethers.Contract(MC3, MC3_ABI, provider);
    const balCalls = erc20Tokens.map(t => ({
      target: t.address, allowFailure: true,
      callData: erc20Iface.encodeFunctionData('balanceOf', [walletAddr])
    }));
    const priceCalls = feedSymbols.map(sym => ({
      target: feeds[sym], allowFailure: true,
      callData: latestAnswerData
    }));
    const results = await mc.aggregate3([...balCalls, ...priceCalls]);

    balances = results.slice(0, balCalls.length).map(r => ({
      success: r.success,
      bal: r.success ? erc20Iface.decodeFunctionResult('balanceOf', r.returnData)[0] : 0n
    }));
    results.slice(balCalls.length).forEach((r, i) => {
      if(r.success) {
        const answer = clIface.decodeFunctionResult('latestAnswer', r.returnData)[0];
        prices[feedSymbols[i]] = Number(answer) / 1e8;
      }
    });
  } catch(e) {
    console.error('Token balances:', e);
    return [];
  }

  if(ethBalance == null) ethBalance = await provider.getBalance(walletAddr);
  const ethPrice = prices['ETH'] || 0;
  const stableSymbols = new Set(['USDC', 'USDT', 'DAI']);
  const holdings = [];
  let totalUsd = 0;

  // ETH
  if(ethBalance > 0n) {
    const ethAmount = Number(ethers.formatEther(ethBalance));
    const ethUsd = ethPrice > 0 ? ethAmount * ethPrice : 0;
    totalUsd += ethUsd;
    holdings.push({token:'ETH', balance:ethers.formatEther(ethBalance).slice(0,10), usd: ethUsd > 0 ? `$${ethUsd.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` : ''});
  }

  // ERC20s
  erc20Tokens.forEach((t, i) => {
    if(!balances[i].success || balances[i].bal === 0n) return;
    const formatted = ethers.formatUnits(balances[i].bal, t.decimals);
    const amount = Number(formatted);
    const display = t.decimals <= 8 ? amount.toFixed(2) : amount.toFixed(4).replace(/\.?0+$/, '');
    let usd = 0;
    if(stableSymbols.has(t.symbol)) {
      usd = amount; totalUsd += amount;
    } else if(prices[t.symbol]) {
      usd = amount * prices[t.symbol]; totalUsd += usd;
    }
    holdings.push({token:t.symbol, balance:display, usd: usd > 0 ? `$${usd.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` : ''});
  });

  return holdings;
}

async function loadAllVaults() {
  if(S.demoMode) return;
  const addr = window._connectedAddress;
  if(!addr) return;
  showLoading('LOADING VAULTS');
  try {
    const wallets = await dbMyWallets(addr);
    if(!wallets.length) {
      S.vaults = [];
      S.sel = 0;
      hideLoading();
      render();
      return;
    }
    const results = await Promise.allSettled(wallets.map(w => loadSingleVaultData(w.address)));
    const vaults = results.filter(r => r.status === 'fulfilled' && r.value).map(r => r.value);
    results.filter(r => r.status === 'rejected').forEach(r => console.error('Load vault:', r.reason));
    S.vaults = vaults;
    S.sel = 0;
    if(vaults.length) {
      S.nt = vaults[0].threshold;
      S.nd = vaults[0].delay / 3600;
    }
    hideLoading();
    render();
    // Load queues + history in background (single render after all complete)
    Promise.all(S.vaults.map((_, i) => Promise.all([loadVaultQueue(i), loadVaultHistory(i)]))).then(render);
  } catch(e) {
    console.error('loadAllVaults:', e);
    hideLoading();
    flash('FAILED TO LOAD');
  }
}

async function loadSingleVaultData(addr) {
  const s = await multicallLoad(addr);
  let dbW = await dbFindWallet(addr);

  // Auto-register vault in DB if not found (e.g. loaded by address)
  if(!dbW && window._connectedAddress) {
    try {
      const ownerList = [...s.owners];
      const dbId = await dbRegisterWallet(addr, window._connectedAddress, 0, ownerList, Number(s.threshold), Number(s.delay), s.executor, 0, '', null, null);
      if(dbId) dbW = { id: dbId, name: null };
    } catch(e) { console.error('Auto-register vault:', e); }
  }

  // Load owner labels from DB
  let ownerLabels = {};
  if(dbW?.id) {
    const labels = await dbGetOwnerLabels(dbW.id);
    labels.forEach(l => { if(l.label) ownerLabels[l.address.toLowerCase()] = l.label; });
  }
  const you = window._connectedAddress;
  const owners = [...s.owners].map(o => ({
    addr: o,
    label: ownerLabels[o.toLowerCase()] || (o.toLowerCase() === you?.toLowerCase() ? 'YOU' : ''),
    you: o.toLowerCase() === you?.toLowerCase()
  }));

  // Detect TimelockExecutor
  let isTE = false, fpEnabled = false;
  if(s.executor !== ethers.ZeroAddress) {
    try {
      const tlContract = new ethers.Contract(s.executor, TIMELOCK_EXECUTOR_ABI, provider);
      fpEnabled = await tlContract.forwardEnabled(addr);
      isTE = true;
    } catch(_) {}
  }

  const holdings = await loadTokenBalances(addr, s.balance);

  return {
    id: dbW?.id || addr.slice(0,8),
    name: dbW?.name || (CHAINS[S.chainId]?.name || 'VAULT').toUpperCase() + '_' + addr.slice(2,6).toUpperCase(),
    chain: (CHAINS[S.chainId]?.name || 'Ethereum').toUpperCase(),
    address: addr,
    threshold: Number(s.threshold),
    ownerCount: Number(s.ownerCount),
    delay: Number(s.delay),
    nonce: Number(s.nonce),
    executor: s.executor,
    holdings: holdings,
    owners: owners,
    queue: [],
    history: [],
    dbId: dbW?.id || null,
    fastPath: fpEnabled,
    loadedOwners: [...s.owners],
    isTimelockExecutor: isTE
  };
}

async function loadVaultQueue(vi) {
  const v = S.vaults[vi];
  if(!v || !v.dbId) return;
  try {
    const txs = await dbGetPending(v.dbId);
    const you = window._connectedAddress;
    const queue = [];
    const allSigs = await Promise.all(txs.map(t => dbGetSigs(t.id)));

    // Verify queued txs against on-chain state (batch via multicall)
    const queuedTxs = txs.filter(t => t.status === 'queued' && t.tx_hash);
    let onchainQueued = {};
    if(queuedTxs.length) {
      try {
        const mc = new ethers.Contract(MC3, MC3_ABI, provider);
        const calls = queuedTxs.map(t => ({
          target: v.address, allowFailure: true,
          callData: msIface.encodeFunctionData('queued', [t.tx_hash])
        }));
        const results = await mc.aggregate3(calls);
        queuedTxs.forEach((t, i) => {
          if(results[i].success) {
            const eta = Number(msIface.decodeFunctionResult('queued', results[i].returnData)[0]);
            onchainQueued[t.tx_hash] = eta;
          }
        });
      } catch(e) { console.error('Queue verification:', e); }
    }

    // Track stale txs to clean up in DB
    const staleTxIds = [];

    for(let ti = 0; ti < txs.length; ti++) {
      const t = txs[ti];

      // Prune proposed txs whose nonce is behind on-chain nonce (already consumed)
      if(t.status === 'proposed' && t.nonce < v.nonce) {
        staleTxIds.push(t.id);
        continue;
      }

      // Prune queued txs that are no longer queued on-chain (executed or cancelled externally)
      if(t.status === 'queued' && t.tx_hash && t.tx_hash in onchainQueued) {
        if(onchainQueued[t.tx_hash] === 0) {
          staleTxIds.push(t.id);
          continue;
        }
        // Update ETA if on-chain differs from DB
        if(onchainQueued[t.tx_hash] !== (t.eta || 0)) {
          t.eta = onchainQueued[t.tx_hash];
        }
      }

      const sigs = allSigs[ti];
      const approvals = {};
      v.owners.forEach(o => approvals[o.addr] = false);
      const addrKey = {};
      v.owners.forEach(o => addrKey[o.addr.toLowerCase()] = o.addr);
      sigs.forEach(s => { const k = addrKey[s.signer.toLowerCase()]; if(k) approvals[k] = true; });

      let dataLabel = 'CALL';
      if(t.call_data === '0x' || !t.call_data) {
        dataLabel = 'TRANSFER';
      } else if(t.call_data.length >= 10) {
        const sel = t.call_data.slice(0, 10);
        if(sel === erc20Iface.getFunction('transfer').selector) dataLabel = 'ERC20 TRANSFER';
        else if(sel === msIface.getFunction('addOwner').selector) dataLabel = 'ADD OWNER';
        else if(sel === msIface.getFunction('removeOwner').selector) dataLabel = 'REMOVE OWNER';
        else if(sel === msIface.getFunction('setThreshold').selector) dataLabel = 'SET THRESHOLD';
        else if(sel === msIface.getFunction('setDelay').selector) dataLabel = 'SET DELAY';
        else if(sel === msIface.getFunction('setExecutor').selector) dataLabel = 'SET EXECUTOR';
        else if(sel === msIface.getFunction('cancelQueued').selector) dataLabel = 'CANCEL';
        else if(sel === msIface.getFunction('executeQueued').selector) dataLabel = 'ACCELERATE';
        else if(sel === msIface.getFunction('batch').selector) dataLabel = 'BATCH';
        else if(sel === msIface.getFunction('delegateCall').selector) dataLabel = 'DELEGATE CALL';
        else if(sel === tlIface.getFunction('enableForward').selector) dataLabel = 'ENABLE FORWARD';
        else dataLabel = `CALL ${sel}`;
      }

      const ethVal = t.value && t.value !== '0' ? ethers.formatEther(BigInt(t.value)) : '0';
      queue.push({
        nonce: t.nonce,
        target: t.target,
        value: ethVal === '0' ? '0' : ethVal,
        token: (t.call_data === '0x' || !t.call_data) && ethVal !== '0' ? 'ETH' : '',
        dataLabel: dataLabel,
        eta: t.eta || 0,
        approvals: approvals,
        dbId: t.id,
        txHash: t.tx_hash,
        callData: t.call_data,
        rawValue: t.value,
        signatures: sigs.map(s => ({signer: s.signer, sig: s.signature, sigType: s.sig_type}))
      });
    }
    v.queue = queue;

    // Background: mark stale txs in DB so they don't reappear
    if(staleTxIds.length) {
      for(const id of staleTxIds) {
        dbMarkExecuted(id, 0, '').catch(e => console.error('Prune stale tx:', e));
      }
    }
  } catch(e) {
    console.error('loadVaultQueue:', e);
  }
}

async function loadVaultHistory(vi) {
  const v = S.vaults[vi];
  if(!v || !v.dbId) return;
  try {
    const rows = await dbGetHistory(v.dbId, 50);
    v.history = rows.map(t => {
      let act = 'CALL';
      if(t.call_data === '0x' || !t.call_data) {
        act = 'TRANSFER';
      } else if(t.call_data && t.call_data.length >= 10) {
        const sel = t.call_data.slice(0, 10);
        if(sel === erc20Iface.getFunction('transfer').selector) act = 'TRANSFER';
        else if(sel === msIface.getFunction('addOwner').selector) act = 'ADD OWNER';
        else if(sel === msIface.getFunction('removeOwner').selector) act = 'REMOVE OWNER';
        else if(sel === msIface.getFunction('setThreshold').selector) act = 'THRESHOLD';
        else if(sel === msIface.getFunction('setDelay').selector) act = 'SET DELAY';
        else if(sel === msIface.getFunction('setExecutor').selector) act = 'SET EXECUTOR';
        else if(sel === msIface.getFunction('cancelQueued').selector) act = 'CANCEL';
        else if(sel === msIface.getFunction('executeQueued').selector) act = 'ACCELERATE';
        else if(sel === msIface.getFunction('batch').selector) act = 'BATCH';
        else if(sel === msIface.getFunction('delegateCall').selector) act = 'DELEGATE CALL';
        else if(sel === tlIface.getFunction('enableForward').selector) act = 'ENABLE FORWARD';
        else act = `CALL ${sel}`;
      }
      const ethVal = t.value && t.value !== '0' ? ethers.formatEther(BigInt(t.value)) : null;
      const desc = t.description || (ethVal ? `${ethVal} ETH → ${t.target.slice(0,6)}...` : act);
      const ts = t.executed_at || t.cancelled_at;
      const age = ts ? fmtAge(new Date(ts)) : '';
      return { nonce: t.nonce, act, desc, status: t.status, age, executionTx: t.execution_tx };
    });
  } catch(e) {
    console.error('loadVaultHistory:', e);
  }
}

function fmtAge(d) {
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if(s < 60) return '<1M';
  if(s < 3600) return Math.floor(s/60) + 'M';
  if(s < 86400) return Math.floor(s/3600) + 'H';
  return Math.floor(s/86400) + 'D';
}

async function reloadVault(vi) {
  const v = S.vaults[vi];
  if(!v) return;
  try {
    const s = await multicallLoad(v.address);
    v.threshold = Number(s.threshold);
    v.ownerCount = Number(s.ownerCount);
    v.delay = Number(s.delay);
    v.nonce = Number(s.nonce);
    v.executor = s.executor;
    // Re-check executor type and forward status
    v.isTimelockExecutor = false;
    v.fastPath = false;
    if(s.executor !== ethers.ZeroAddress) {
      try {
        const tlContract = new ethers.Contract(s.executor, TIMELOCK_EXECUTOR_ABI, provider);
        v.fastPath = await tlContract.forwardEnabled(v.address);
        v.isTimelockExecutor = true;
      } catch(_) {}
    }
    const you = window._connectedAddress;
    // Preserve existing labels
    const oldLabels = {};
    v.owners.forEach(o => { if(o.label) oldLabels[o.addr.toLowerCase()] = o.label; });
    // Apply pending label from addOwner
    if(v._pendingLabel && v._pendingLabel.label) {
      oldLabels[v._pendingLabel.addr] = v._pendingLabel.label;
    }
    v.owners = [...s.owners].map(o => ({
      addr: o,
      label: oldLabels[o.toLowerCase()] || (o.toLowerCase() === you?.toLowerCase() ? 'YOU' : ''),
      you: o.toLowerCase() === you?.toLowerCase()
    }));
    v.loadedOwners = [...s.owners];
    // Persist pending label to DB then clear it
    if(v._pendingLabel && v._pendingLabel.label && v.dbId) {
      const pl = v._pendingLabel;
      const match = v.owners.find(o => o.addr.toLowerCase() === pl.addr);
      if(match) dbUpdateOwnerLabel(v.dbId, match.addr, pl.label);
    }
    delete v._pendingLabel;
    v.holdings = await loadTokenBalances(v.address, s.balance);
    await Promise.all([loadVaultQueue(vi), loadVaultHistory(vi)]);
    if(v.dbId) dbSyncWalletState(v.address, v.dbId);
    render();
  } catch(e) {
    console.error('reloadVault:', e);
    flash('RELOAD FAILED');
  }
}

      flash(`LOADED: ${checksummed.slice(0,10)}...`);

// ── PRODUCTION: CREATE2 VANITY ────────────────────────────────────

function buildInitcode(impl) {
  return '0x602d5f8160095f39f35f5f365f5f37365f73' + impl.slice(2).toLowerCase() + '5af43d5f5f3e6029573d5ffd5b3d5ff3';
}

async function mineVanitySalt(factory, impl, caller) {
  const hash = ethers.keccak256(buildInitcode(impl));
  const base = BigInt(caller) << 96n;
  for(let n = 0n; ; n++) {
    const salt = '0x' + (base | n).toString(16).padStart(64, '0');
    const addr = ethers.getCreate2Address(factory, salt, hash);
    if(addr.slice(2, 4) === '00') {
      const code = await provider.getCode(addr);
      if(code !== '0x') continue; // already deployed on this chain
      return { salt: base | n, address: addr, nonce: n };
    }
    if(n > 0n && n % 5000n === 0n) await new Promise(r => setTimeout(r, 0));
  }
}

// ── PRODUCTION: DEPLOY ────────────────────────────────────────────

async function prodDeploy() {
  const signer = window._signer;
  const connectedAddress = window._connectedAddress;
  if(!signer) { flash('CONNECT WALLET FIRST'); return; }

  const c = S.cf, net = NETS[c.net];
  const valid = c.owners.filter(o => o.addr.trim());
  if(!valid.length) { flash('ADD AT LEAST 1 OWNER'); return; }
  if(parseInt(c.threshold) > valid.length) { flash('THRESHOLD > OWNER COUNT'); return; }

  // Resolve all owner addresses
  const resolvedOwners = [];
  for(const o of valid) {
    try {
      const addr = await resolveName(o.addr);
      resolvedOwners.push(addr);
    } catch(e) {
      flash(`INVALID OWNER: ${o.addr}`);
      return;
    }
  }
  resolvedOwners.sort((a, b) => a.toLowerCase() < b.toLowerCase() ? -1 : 1);

  // Ensure connected address is an owner
  if(!resolvedOwners.some(o => o.toLowerCase() === connectedAddress.toLowerCase())) {
    resolvedOwners.push(connectedAddress);
    resolvedOwners.sort((a, b) => a.toLowerCase() < b.toLowerCase() ? -1 : 1);
  }

  const thresh = Math.min(parseInt(c.threshold) || 1, resolvedOwners.length);
  const del = (parseInt(c.delayH) || 0) * 3600;
  const executor = del > 0 ? TIMELOCK_EXECUTOR : ethers.ZeroAddress;
  const wantForward = c.fastPath && del > 0;

  // Ensure wallet is on the right chain
  const targetChainId = net.id;
  if(targetChainId !== S.chainId) {
    await switchChain(targetChainId, true);
  }
  // Verify wallet actually switched
  if(window._connectedWalletProvider) {
    try {
      const wc = await window._connectedWalletProvider.request({method:'eth_chainId'});
      const walletChain = parseInt(wc, 16);
      if(walletChain !== targetChainId) {
        // Revert app state to wallet's actual chain
        S.chainId = walletChain;
        localStorage.setItem('ms_chain', String(walletChain));
        provider = makeProvider(walletChain);
        render();
        flash('SWITCH TO ' + net.name + ' TO DEPLOY');
        return;
      }
    } catch(_) {}
  }

  try {
    showLoading('MINING ADDRESS');
    const result = await mineVanitySalt(FACTORY, IMPLEMENTATION, connectedAddress);
    showLoading('DEPLOYING');

    const factory = new ethers.Contract(FACTORY, FACTORY_ABI, signer);
    let tx;
    if(wantForward) {
      const enableData = tlIface.encodeFunctionData('enableForward', [true]);
      tx = await factory.createWithCalls(resolvedOwners, del, thresh, executor, result.salt,
        [TIMELOCK_EXECUTOR], [0], [enableData]);
    } else {
      tx = await factory.create(resolvedOwners, del, thresh, executor, result.salt);
    }
    flash('TX SENT, WAITING...');

function senderSig(addr) {
  return '0x' + addr.slice(2).toLowerCase().padStart(64, '0') + '0'.repeat(64) + '00';
}

async function prodSign(vi, nonce) {
  const signer = window._signer;
  const connectedAddress = window._connectedAddress;
  if(!signer) { flash('CONNECT WALLET FIRST'); return; }
  const v = S.vaults[vi];
  const tx = v.queue.find(t => t.nonce === nonce);
  if(!tx) return;

  try {
    const target = tx.target;
    const value = tx.rawValue ? BigInt(tx.rawValue) : ethers.parseEther(tx.value || '0');
    const data = tx.callData || '0x';
    const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
    const msg = { target, value, data, nonce };
    const sig = await signer.signTypedData(domain, EIP712_TYPES, msg);

    // Update local state
    tx.approvals[connectedAddress] = true;
    if(!tx.signatures) tx.signatures = [];
    const existing = tx.signatures.findIndex(s => s.signer.toLowerCase() === connectedAddress.toLowerCase());
    if(existing >= 0) tx.signatures[existing] = {signer: connectedAddress, sig, sigType: 'ecdsa'};
    else tx.signatures.push({signer: connectedAddress, sig, sigType: 'ecdsa'});
    tx.signatures.sort((a,b) => a.signer.toLowerCase() < b.signer.toLowerCase() ? -1 : 1);

    // Persist to DB
    if(tx.dbId) {
      await dbAddSig(tx.dbId, connectedAddress, sig);
    } else if(v.dbId) {
      const txHash = ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, msg);
      const txId = await dbProposeTx(v.dbId, nonce, target, value.toString(), data, txHash, v.threshold, connectedAddress);
      if(txId) {
        tx.dbId = txId;
        tx.txHash = txHash;
        await dbAddSig(txId, connectedAddress, sig);
      }
    }

    flash(`SIGNED #${nonce} (OFF-CHAIN)`);
    render();
  } catch(e) {

    flash(e.shortMessage || e.message || 'SIGN FAILED');

async function prodUnsign(vi, nonce) {
  const signer = window._signer;

  if(!connectedAddress) return;
  const v = S.vaults[vi];
  const tx = v.queue.find(t => t.nonce === nonce);

  // Check if this was an on-chain approval — if so, revoke it on-chain
  const mySig = tx.signatures?.find(s => s.signer.toLowerCase() === connectedAddress.toLowerCase());
  const wasOnchainApproval = mySig && (mySig.sigType === 'approval' || mySig.sigType === 'sender');
  if(wasOnchainApproval && signer) {
    try {
      const target = tx.target;
      const value = tx.rawValue ? BigInt(tx.rawValue) : ethers.parseEther(tx.value || '0');
      const data = tx.callData || '0x';
      const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
      const hash = tx.txHash || ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, { target, value, data, nonce });
      const ms = new ethers.Contract(v.address, MULTISIG_ABI, signer);
      flash('REVOKING ON-CHAIN...');

      const receipt = await atx.wait();
      if(v.dbId) await dbRecordApproval(v.dbId, S.chainId, connectedAddress, hash, false, Number(receipt.blockNumber), receipt.hash);
    } catch(e) {

}

function verifySigs(sigs, domain, types, msg, owners) {
  const ownerSet = new Set(owners.map(o => o.toLowerCase()));
  const verified = [];
  for(const s of sigs) {
    // Sender/approval sigs (on-chain approvals) — trust them, contract validates
    if(s.sigType === 'approval' || s.sigType === 'sender') {
      if(ownerSet.has(s.signer.toLowerCase())) verified.push(s);
      continue;
    }
    // Verify ECDSA sigs client-side
    try {
      const recovered = ethers.verifyTypedData(domain, types, msg, s.sig);
      if(recovered.toLowerCase() === s.signer.toLowerCase() && ownerSet.has(recovered.toLowerCase())) {
        verified.push(s);
      } else {
        console.warn(`Sig verification failed for ${s.signer}: recovered ${recovered}`);
      }
    } catch(e) {
      console.warn(`Invalid sig from ${s.signer}:`, e.message);
    }
  }
  return verified;
}

async function prodSubmit(vi, nonce) {
  const signer = window._signer;
  const connectedAddress = window._connectedAddress;
  if(!signer) { flash('CONNECT WALLET FIRST'); return; }
  const v = S.vaults[vi];
  const tx = v.queue.find(t => t.nonce === nonce);
  if(!tx) return;

  try {
    const target = tx.target;
    const value = tx.rawValue ? BigInt(tx.rawValue) : ethers.parseEther(tx.value || '0');
    const data = tx.callData || '0x';

    // Collect signatures and verify
    const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
    const msg = { target, value, data, nonce };
    let sigs = tx.signatures || [];
    const ownerAddrs = v.loadedOwners || v.owners.map(o => o.addr);
    sigs = verifySigs(sigs, domain, EIP712_TYPES, msg, ownerAddrs);
    const callerIsOwner = ownerAddrs.some(o => o.toLowerCase() === connectedAddress.toLowerCase());
    const callerHasSigned = sigs.some(s => s.signer.toLowerCase() === connectedAddress.toLowerCase());
    if(callerIsOwner && !callerHasSigned) {
      sigs = [...sigs, {signer: connectedAddress, sig: senderSig(connectedAddress), sigType: 'sender'}];
    }
    sigs.sort((a,b) => a.signer.toLowerCase() < b.signer.toLowerCase() ? -1 : 1);

    const ms = new ethers.Contract(v.address, MULTISIG_ABI, signer);

    // Check for cancel-via-executor or forward path
    const isCancelCall = v.isTimelockExecutor
      && target.toLowerCase() === v.address.toLowerCase()
      && data.length >= 10 && data.slice(0, 10) === msIface.getFunction('cancelQueued').selector;
    const canCancel = isCancelCall && sigs.length >= v.threshold;
    const canForward = v.isTimelockExecutor && v.fastPath && sigs.length === v.ownerCount && !isCancelCall;

    if(!canCancel && !canForward && sigs.length < v.threshold) {
      flash(`NEED ${v.threshold - sigs.length} MORE VALID SIG${v.threshold - sigs.length > 1 ? 'S' : ''}`);
      return;
    }

    let atx;
    if(canCancel || canForward) {
      const executorAddr = v.executor;
      const tlContract = new ethers.Contract(executorAddr, TIMELOCK_EXECUTOR_ABI, signer);
      // Cancel needs threshold sigs, forward needs all (already ownerCount)
      const fwdSigs = canCancel ? sigs.slice(0, v.threshold) : sigs;
      let forwardSigs = '0x';
      for(const s of fwdSigs) forwardSigs += s.sig.slice(2);
      flash(canCancel ? 'CANCELLING VIA EXECUTOR...' : 'FORWARDING VIA EXECUTOR...');
      atx = await tlContract.forward(v.address, target, value, data, forwardSigs);
    } else {
      // Contract requires exactly threshold * 65 bytes of sigs
      const execSigs = sigs.slice(0, v.threshold);
      let packedSigs = '0x';
      for(const s of execSigs) packedSigs += s.sig.slice(2);
      flash('SUBMITTING TX...');
      atx = await ms.execute(target, value, data, packedSigs);
    }

    flash('TX SENT, WAITING...');
    const receipt = await atx.wait();

    // Parse events
    for(const log of receipt.logs) {
      try {
        let parsed = msIface.parseLog(log);
        if(!parsed) parsed = tlIface.parseLog(log);
        if(parsed?.name === 'ExecutionSuccess') {
          flash(`EXECUTED #${nonce}`);
          if(tx.dbId) await dbMarkExecuted(tx.dbId, Number(receipt.blockNumber), receipt.hash);
        }
        if(parsed?.name === 'Queued') {
          const eta = Number(parsed.args[2]);
          if(eta === 0) {
            flash('CANCELLED QUEUED TX');
            const cancelledHash = parsed.args[0];
            const cancelledDbTx = await dbGetTxByHash(cancelledHash);
            if(cancelledDbTx) await dbCancelTx(cancelledDbTx.id, connectedAddress);
          } else {
            tx.eta = eta;
            flash(`QUEUED #${nonce} \u2014 ETA: ${new Date(eta*1000).toLocaleString()}`);
            if(tx.dbId) await dbMarkQueued(tx.dbId, eta, Number(receipt.blockNumber));
          }
        }
      } catch(_){}
    }

    await reloadVault(vi);
  } catch(e) {
    console.error(e);
    flash(e.shortMessage || e.message || 'SUBMIT FAILED');
  }
}

async function prodAccelerate(vi, nonce) {
  const signer = window._signer;
  const connectedAddress = window._connectedAddress;
  if(!signer) { flash('CONNECT WALLET FIRST'); return; }
  const v = S.vaults[vi];
  const tx = v.queue.find(t => t.nonce === nonce);
  if(!tx) return;

  const target = tx.target;
  const value = tx.rawValue ? BigInt(tx.rawValue) : ethers.parseEther(tx.value || '0');
  const data = tx.callData || '0x';

  // Accelerate uses executor.forward() with a self-call to executeQueued
  // This requires unanimous (all owners) signatures, same as instant execute
  // forward() hashes with the live nonce, so all signers must agree on the same nonce
  const accelData = msIface.encodeFunctionData('executeQueued', [target, value, data, nonce]);
  const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
  const ownerAddrs = v.loadedOwners || v.owners.map(o => o.addr);

  try {
    // Check DB for an existing accelerate proposal (first signer sets the nonce)
    let accelNonce = v.nonce;
    let existingSigs = [];
    let existingTxId = null;
    if(v.dbId) {
      // Look for an existing accelerate entry for this original tx nonce
      const { data: rows } = await sb.from('transactions')
        .select('id, nonce, tx_hash')
        .eq('wallet_id', v.dbId)
        .eq('description', `Accelerate #${nonce}`)
        .in('status', ['proposed', 'executing'])
        .limit(1);
      if(rows?.length) {
        existingTxId = rows[0].id;
        accelNonce = rows[0].nonce;
        const dbSigs = await dbGetSigs(existingTxId);
        const msg = { target: v.address, value: 0n, data: accelData, nonce: accelNonce };
        existingSigs = verifySigs(dbSigs, domain, EIP712_TYPES, msg, ownerAddrs);
        // If nonce changed on-chain and existing sigs are invalid, start fresh
        if(existingSigs.length === 0 && dbSigs.length > 0) {
          accelNonce = v.nonce;
          existingTxId = null;
        }
      }
    }

    const msg = { target: v.address, value: 0n, data: accelData, nonce: accelNonce };
    const accelTxHash = ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, msg);

    // Add caller's sig
    let sigs = [...existingSigs];
    const callerIsOwner = ownerAddrs.some(o => o.toLowerCase() === connectedAddress.toLowerCase());
    const callerHasSigned = sigs.some(s => s.signer.toLowerCase() === connectedAddress.toLowerCase());
    if(callerIsOwner && !callerHasSigned) {
      const sig = await signer.signTypedData(domain, EIP712_TYPES, msg);
      sigs.push({signer: connectedAddress, sig, sigType: 'ecdsa'});
      // Store sig in DB
      if(v.dbId) {
        if(!existingTxId) {
          existingTxId = await dbProposeTx(v.dbId, accelNonce, v.address, '0', accelData, accelTxHash, v.ownerCount, connectedAddress, `Accelerate #${nonce}`);
        }
        if(existingTxId) await dbAddSig(existingTxId, connectedAddress, sig);
      }
    }
    sigs.sort((a,b) => a.signer.toLowerCase() < b.signer.toLowerCase() ? -1 : 1);

    if(sigs.length < v.ownerCount) {
      flash(`SIGNED ACCELERATE (${sigs.length}/${v.ownerCount}) — NEED ALL OWNERS`);
      await reloadQueue(vi);
      return;
    }

    // Verify nonce still matches on-chain before executing
    const ms = new ethers.Contract(v.address, MULTISIG_ABI, provider);
    const liveNonce = Number(await ms.nonce());
    if(liveNonce !== accelNonce) {
      flash('NONCE CHANGED — RESIGNING NEEDED');
      // Invalidate stale sigs in DB
      if(existingTxId) {
        await sb.from('transactions').update({status: 'cancelled', cancelled_at: new Date().toISOString()}).eq('id', existingTxId);
      }
      await reloadQueue(vi);
      return;
    }

    // All sigs collected — execute via forward()
    let packedSigs = '0x';
    for(const s of sigs) packedSigs += s.sig.slice(2);

    const tlContract = new ethers.Contract(v.executor, TIMELOCK_EXECUTOR_ABI, signer);
    flash('ACCELERATING VIA EXECUTOR...');
    const atx = await tlContract.forward(v.address, v.address, 0n, accelData, packedSigs);
    flash('TX SENT, WAITING...');
    const receipt = await atx.wait();

    if(v.dbId) {
      if(existingTxId) await dbMarkExecuted(existingTxId, Number(receipt.blockNumber), receipt.hash);
      if(tx.dbId) await dbMarkExecuted(tx.dbId, Number(receipt.blockNumber), receipt.hash);
    }
    flash(`ACCELERATED #${nonce} VIA EXECUTOR`);
    await reloadVault(vi);
  } catch(e) {
    console.error(e);
    flash(e.shortMessage || e.message || 'ACCELERATE FAILED');
  }
}

      target = toAddr;
      value = ethers.parseEther(amt).toString();
      data = '0x';
      desc = `${amt} ETH \u2192 ${toAddr.slice(0,8)}...`;
    } else {
      const parsed = ethers.parseUnits(amt, tokenInfo.decimals);
      target = tokenInfo.address;
      value = '0';
      data = erc20Iface.encodeFunctionData('transfer', [toAddr, parsed]);
      desc = `${amt} ${tokenInfo.symbol} \u2192 ${toAddr.slice(0,8)}...`;
    }

    const domain = { ...EIP712_DOMAIN, chainId: S.chainId, verifyingContract: v.address };
    const nonce = nextNonce(v);
    const msg = { target, value: BigInt(value), data, nonce };
    const sig = await signer.signTypedData(domain, EIP712_TYPES, msg);
    const txHash = ethers.TypedDataEncoder.hash(domain, EIP712_TYPES, msg);

    if(v.dbId) {
      const txId = await dbProposeTx(v.dbId, nonce, target, value, data, txHash, v.threshold, connectedAddress, desc);
      if(txId) await dbAddSig(txId, connectedAddress, sig);
    }

    flash(`TX #${nonce} CREATED`);
    S.showTx = false;
    await reloadQueue(S.sel);
  } catch(e) {
    console.error(e);
    flash(e.shortMessage || e.message || 'FAILED');
  }
}
